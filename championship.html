<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CUSA Championship Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;700&display=swap">
<style>
@font-face{font-family:'Proxima Nova';font-weight:700;src:url('fonts/ProximaNovaBold.woff') format('woff'),url('fonts/ProximaNovaBold.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Gazzetta ExtraBold';src:url('fonts/gazzetta-extrabold.otf') format('opentype');font-display:swap}
@font-face{font-family:'Gazzetta Black';src:url('fonts/gazzetta-black.otf') format('opentype');font-display:swap}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Barlow',sans-serif;background:#060f1a;color:#fff}
body{display:flex;flex-direction:column;overflow:hidden}

.topbar{width:100%;background:#0a1624;border-bottom:2px solid rgba(235,25,70,0.5);display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:54px;flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-logo{height:30px;width:auto;display:block;filter:drop-shadow(0 2px 12px rgba(235,25,70,0.25))}
.topbar-sep{width:1px;height:22px;background:rgba(255,255,255,0.2)}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:2px;color:#fff}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-status{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,0.5)}
.topbar-status.error{color:#ff6f8b}
.back{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.6);text-decoration:none;border:1px solid rgba(255,255,255,0.18);padding:7px 12px;border-radius:4px}
.back:hover{color:#fff;border-color:rgba(235,25,70,0.6)}

.tabs{width:100%;background:rgba(10,22,36,0.9);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;gap:0;padding:0 12px;flex-shrink:0}
.tab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.45);text-transform:uppercase;background:transparent;border:none;padding:11px 18px;cursor:pointer;border-bottom:2px solid transparent}
.tab:hover{color:rgba(255,255,255,0.75)}
.tab.active{color:#fff;border-bottom-color:#EB1946}
.tab:disabled{cursor:not-allowed;opacity:0.45}

.main{display:flex;width:100%;gap:14px;padding:12px;flex:1;min-height:0;overflow:hidden}

.panel{background:#0e1d2e;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:14px;width:340px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;overflow-y:auto;height:100%}
.panel-head{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:3px;color:rgba(235,25,70,0.85);text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid rgba(235,25,70,0.18)}

.field{display:flex;flex-direction:column;gap:5px}
.field-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.55);text-transform:uppercase}
.field input[type=text],.field input[type=number],.field select{font-family:'Barlow',sans-serif;font-size:13px;background:#0a1624;color:#fff;border:1px solid rgba(255,255,255,0.18);border-radius:4px;padding:8px 10px;width:100%}
.field input[type=text]:focus,.field input[type=number]:focus,.field select:focus{outline:none;border-color:#EB1946}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.field input[type=range]{width:100%;accent-color:#EB1946}
.nudge-readout{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;color:rgba(235,25,70,0.85);margin-left:6px}

.team-card{border:1px solid rgba(235,25,70,0.18);border-radius:6px;padding:10px 11px;background:rgba(235,25,70,0.04);display:flex;flex-direction:column;gap:8px}
.team-card-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:3px;color:rgba(235,25,70,0.85);text-transform:uppercase}

.upload-zone{display:block;padding:18px;text-align:center;border:2px dashed rgba(235,25,70,0.3);border-radius:4px;cursor:pointer;font-size:11px;font-family:'Barlow Condensed',sans-serif;color:rgba(255,255,255,0.4);letter-spacing:1px;font-weight:700;text-transform:uppercase}
.upload-zone:hover{border-color:rgba(235,25,70,0.55);color:rgba(255,255,255,0.7)}
.upload-zone.loaded{color:#4de08a;border-color:rgba(77,224,138,0.4)}
.upload-zone input{display:none}

.btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;color:#fff;background:#EB1946;border:none;padding:11px 16px;border-radius:4px;cursor:pointer;text-transform:uppercase;width:100%}
.btn:hover{background:#c91240}
.btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.25)}
.btn.secondary:hover{background:rgba(255,255,255,0.06)}
.panel-spacer{flex:1}

.canvas-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0;min-height:0;height:100%;padding:8px}
.canvas-wrap{position:relative;border-radius:4px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.85);height:100%;width:auto;aspect-ratio:1080/1350;max-width:100%;background:#000}
.canvas-wrap canvas{display:block;width:100%;height:100%}
.preview-meta{margin-top:10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.35);text-align:center}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js" onerror="console.warn('config.js not generated — run bash build.sh')"></script>
<script src="assets/cusa-auth.js"></script>
<script src="assets/cusa-cloud-state.js"></script>
<script src="assets/cusa-page.js"></script>
</head>

<script>
// ─── Config ───────────────────────────────────────────────────────────────
const ASSET_DIR         = 'championship/softball-final-score/';
const ASSET_DIR_PRIMARY = 'matchup/primary/';

// Pre-designed championship logos that already bake in their own colored
// substrate + texture. Keyed by the canonical school name from schools.json.
// Schools NOT in this map render as a colored box + IMS primary logo.
const CUSTOM_LOGOS = {
  'Delaware':              '26 SB Final Score - Delaware.png',
  'Florida International': '26 SB Final Score - FIU.png',
  'Jacksonville State':    '26 SB Final Score - Jax State.png',
  'Louisiana Tech':        '26 SB Final Score - LA Tech.png',
  'Liberty':               '26 SB Final Score - Liberty.png',
  'New Mexico State':      '26 SB Final Score - New Mexico State.png',
  'Sam Houston':           '26 SB Final Score - SHSU.png',
  'UCF':                   '26 SB Final Score - UCF.png',
  'Western Kentucky':      '26 SB Final Score - WKU.png',
};

// Saved-state IDs from before we switched to schools.json — mapped to the
// canonical names so old state still resolves a school after restore.
const LEGACY_NAME_MAP = {
  'FIU':       'Florida International',
  'Jax State': 'Jacksonville State',
  'LA Tech':   'Louisiana Tech',
};
const migrateSchoolName = (n) => LEGACY_NAME_MAP[n] || n;

// CUSA full members + key affiliates — these float to the top of the dropdown.
const CUSA_PRIORITY_NAMES = new Set([
  'Liberty','Middle Tennessee','Delaware','Florida International',
  'Jacksonville State','Kennesaw State','Louisiana Tech','Missouri State',
  'New Mexico State','Sam Houston','UTEP','Western Kentucky','Dallas Baptist','UCF',
]);

// Fallback school list (the 8 with custom logos) — used until schools.json
// finishes loading so the page renders something on first paint.
const SCHOOLS_FALLBACK = Object.keys(CUSTOM_LOGOS).map(name => ({ name, primary: '', swatch: '', espn: '' }));
let SCHOOLS = SCHOOLS_FALLBACK.slice();

function schoolColor(s){
  if (!s) return '#666666';
  const sw = (s.swatch || '').trim();
  if (sw && sw !== 'N/A' && /^#?[0-9a-f]+/i.test(sw)) return sw[0] === '#' ? sw : '#' + sw;
  const ep = (s.espn || '').trim();
  if (ep && /^#?[0-9a-f]+/i.test(ep)) return ep[0] === '#' ? ep : '#' + ep;
  return '#666666';
}
function escapeAttr(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
async function loadSchoolsJson(){
  try {
    const r = await fetch('matchup/schools.json', { cache: 'no-cache' });
    if (!r.ok) throw new Error('schools.json HTTP ' + r.status);
    const data = await r.json();
    if (Array.isArray(data) && data.length) SCHOOLS = data;
  } catch (e) {
    console.warn('Could not load schools.json — falling back to seed list.', e);
  }
}

// Linear darken — multiply each RGB channel by factor (0..1).
function darkenHex(hex, factor) {
  const h = (hex || '#666666').replace('#', '');
  const r = Math.round(parseInt(h.slice(0,2),16) * factor);
  const g = Math.round(parseInt(h.slice(2,4),16) * factor);
  const b = Math.round(parseInt(h.slice(4,6),16) * factor);
  const cl = v => Math.max(0, Math.min(255, v));
  return `rgb(${cl(r)},${cl(g)},${cl(b)})`;
}

// Layer assets (loaded once)
const LAYERS = {
  bg:                ASSET_DIR + '26 SB Final Score - BG.png',
  cusaWatermark:     ASSET_DIR + '26 SB Final Score - CUSA Logo Overlay.png',
  scoreOverlay:      ASSET_DIR + '26 SB Final Score - Score Overlay.png',
  scoreBoxes:        ASSET_DIR + '26 SB Final Score - Score Boxes.png',
  seedsBoxes:        ASSET_DIR + '26 SB Final Score - Seeds Boxes.png',
  championshipLogo:  ASSET_DIR + '26 SB Final Score - Championship Logo.png',
};

// Geometry (1080×1350 source coords; measured from the reference PNGs).
// The Score Box PNG has an 11-pixel anti-aliased drop shadow above its
// solid body (alpha ramps y=697..707, then full-opaque body at y=708).
// Stopping the photo at y=697 left that shadow ramp visible as a thin
// gap against the photo bottom. Extending the photo down to y=708 puts
// the shadow ON the photo so the transition reads as a single continuous
// edge against the gray FINAL SCORE banner — no gap.
//   - Score Box outer bbox: x=19..1060, y=697..1330 (incl. shadow)
//   - Score Box solid body: x=30..1049, y=708..1319

// ─── Image loading ────────────────────────────────────────────────────────
const imgCache = new Map();
function loadImage(src){
  if (imgCache.has(src)) return imgCache.get(src);
  const p = new Promise((resolve, reject) => {
    const img = new Image();
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error('Image load failed: ' + src));
    img.src = src;
  });
  imgCache.set(src, p);
  return p;
}

async function ensureLayer(key){
  if (state.layerImgs[key]) return state.layerImgs[key];
  state.layerImgs[key] = await loadImage(encodeURI(LAYERS[key]));
  return state.layerImgs[key];
}

async function ensureSchoolLogo(side){
  const sObj = state[side];
  const conf = SCHOOLS.find(s => s.name === sObj.school);
  if (!conf) { sObj.logoImg = null; sObj.isCustomLogo = false; return null; }
  const customFile = CUSTOM_LOGOS[conf.name];
  if (customFile) {
    sObj.isCustomLogo = true;
    try { sObj.logoImg = await loadImage(encodeURI(ASSET_DIR + customFile)); }
    catch (_) { sObj.logoImg = null; setStatus('Could not load custom logo for ' + sObj.school, true); }
    return sObj.logoImg;
  }
  sObj.isCustomLogo = false;
  if (!conf.primary) { sObj.logoImg = null; setStatus('No IMS logo file for ' + sObj.school, true); return null; }
  try { sObj.logoImg = await loadImage(encodeURI(ASSET_DIR_PRIMARY + conf.primary)); }
  catch (_) { sObj.logoImg = null; setStatus('Could not load IMS logo for ' + sObj.school, true); }
  return sObj.logoImg;
}

// ─── Render ───────────────────────────────────────────────────────────────
function drawCoverFit(img, x, y, w, h, nudgeDx, nudgeDy, scale){
  const s = (scale ?? 100) / 100;
  const ar = img.naturalWidth / img.naturalHeight;
  const tar = w / h;
  let dx, dy, dw, dh;
  if (ar > tar) {
    dh = h * s;
    dw = h * s * ar;
    dx = x - (dw - w) / 2;
    dy = y - (dh - h) / 2;
  } else {
    dw = w * s;
    dh = w * s / ar;
    dx = x - (dw - w) / 2;
    dy = y - (dh - h) / 2;
  }
  dx += (nudgeDx || 0);
  dy += (nudgeDy || 0);
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  ctx.drawImage(img, dx, dy, dw, dh);
  ctx.restore();
}

// Contain-fit: scale the image to fit inside (w,h) preserving aspect ratio,
// centered. Used for IMS primary logos sitting inside the team-color block.
function drawContainFit(img, x, y, w, h){
  const ar = img.naturalWidth / img.naturalHeight;
  const tar = w / h;
  let dw, dh;
  if (ar > tar) { dw = w; dh = w / ar; }
  else          { dh = h; dw = h * ar; }
  const ox = x + (w - dw) / 2;
  const oy = y + (h - dh) / 2;
  ctx.drawImage(img, ox, oy, dw, dh);
}

function drawTeamSide(side){
  const sObj = state[side];
  const adj  = side === 'top' ? state.adj.topLogo  : state.adj.botLogo;
  const blk  = side === 'top' ? state.adj.topBlock : state.adj.botBlock;
  const baseY = side === 'top' ? TEAM_LOGO.topY : TEAM_LOGO.botY;
  // Scale the whole block (custom PNG or color-box + IMS logo) around the
  // base center; X/Y nudges then translate the scaled rect.
  const s = (adj.scale ?? 100) / 100;
  const w = TEAM_LOGO.w * s;
  const h = TEAM_LOGO.h * s;
  const cx = TEAM_LOGO.x + TEAM_LOGO.w / 2;
  const cy = baseY + TEAM_LOGO.h / 2;
  const x = cx - w / 2 + adj.dx;
  const y = cy - h / 2 + adj.dy;

  // Custom-designed PNG: includes its own colored substrate; render as-is.
  if (sObj.isCustomLogo && sObj.logoImg) {
    ctx.drawImage(sObj.logoImg, x, y, w, h);
    return;
  }

  // Programmatic backdrop: color box + optional 3-stop vertical gradient.
  const conf = SCHOOLS.find(s => s.name === sObj.school);
  const baseColor = (blk.color && blk.color.trim()) || schoolColor(conf);
  if (blk.useGradient !== false) {
    const k = Math.max(0, Math.min(100, blk.intensity ?? 100)) / 100;
    const grad = ctx.createLinearGradient(0, y, 0, y + h);
    grad.addColorStop(0,    darkenHex(baseColor, 1 - 0.07 * k));
    grad.addColorStop(0.30, baseColor);
    grad.addColorStop(1,    darkenHex(baseColor, 1 - 0.15 * k));
    ctx.fillStyle = grad;
  } else {
    ctx.fillStyle = baseColor;
  }
  ctx.fillRect(x, y, w, h);

  if (sObj.logoImg) drawContainFit(sObj.logoImg, x, y, w, h);
}

async function draw(){
  ctx.clearRect(0, 0, 1080, 1350);

  // 1. BG (full canvas) — custom upload takes precedence over the default asset.
  if (state.customBg) {
    try { ctx.drawImage(state.customBg, 0, 0, 1080, 1350); }
    catch (e) { ctx.fillStyle = '#0a1628'; ctx.fillRect(0,0,1080,1350); console.error(e); }
  } else {
    try { ctx.drawImage(await ensureLayer('bg'), 0, 0, 1080, 1350); }
    catch (e) { ctx.fillStyle = '#0a1628'; ctx.fillRect(0,0,1080,1350); console.error(e); }
  }

  // 2. Photo (clipped to photo area, with operator-controlled nudge + zoom)
  if (state.photo) {
    const p = state.adj.photo || {};
    drawCoverFit(state.photo, PHOTO_AREA.x, PHOTO_AREA.y, PHOTO_AREA.w, PHOTO_AREA.h,
      p.dx || 0, p.dy || 0, p.scale ?? 100);
  } else {
    // Placeholder: dim rectangle + hint
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(PHOTO_AREA.x, PHOTO_AREA.y, PHOTO_AREA.w, PHOTO_AREA.h);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '800 28px "Barlow Condensed",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('UPLOAD AN ACTION PHOTO', PHOTO_AREA.x + PHOTO_AREA.w/2, PHOTO_AREA.y + PHOTO_AREA.h/2);
  }

  // 3. CUSA watermark — translucent C-USA mark drawn ONLY over an uploaded
  //     action photo (re-brands the photo). When no photo is uploaded the BG
  //     already has C-USA baked into its upper-right corner, so we skip this
  //     to avoid a double stamp.
  if (state.photo) {
    try { ctx.drawImage(await ensureLayer('cusaWatermark'), 0, 0, 1080, 1350); } catch (_) {}
  }

  // 4. Final Score overlay — combined FINAL SCORE banner + C-USA + R/H/E
  //     label strip + dark navy substrate behind the team-logo / score rows.
  //     Drawn BEFORE the team logos so the navy substrate sits behind them.
  if (!state.hideOverlays) {
    try { ctx.drawImage(await ensureLayer('scoreOverlay'), 0, 0, 1080, 1350); } catch (_) {}
  }

  // 5. Per-team backdrop + logo. Schools with a custom-designed PNG render
  //    the PNG directly (it already bakes in its colored substrate). All
  //    other schools get a primary-color box + optional vertical 3-stop
  //    gradient with an IMS primary logo on top.
  drawTeamSide('top');
  drawTeamSide('bot');

  // 6. Score Boxes — C-USA + R/H/E label strip plus tinted score-value cells
  //     for each row. Sits on top of the navy substrate from the Final Score
  //     overlay; under the seed boxes so seed numbers can be read first.
  if (!state.hideOverlays) {
    try { ctx.drawImage(await ensureLayer('scoreBoxes'), 0, 0, 1080, 1350); } catch (_) {}
  }

  // 7. Seed Boxes (small light-gray squares to the left of each team logo)
  if (!state.hideOverlays) {
    try { ctx.drawImage(await ensureLayer('seedsBoxes'), 0, 0, 1080, 1350); } catch (_) {}
  }

  // ── 8. Text overlays — all values in white per spec. ──
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Seeds in navy so they read on the light-gray seed boxes.
  ctx.fillStyle = NAVY;
  ctx.font = SEED_FONT;
  ctx.fillText(state.top.seed || '', SEED_CX, SEED_CY.top);
  ctx.fillText(state.bot.seed || '', SEED_CX, SEED_CY.bot);

  // R/H/E values in white on the navy substrate.
  ctx.fillStyle = WHITE;
  ctx.font = SCORE_FONT;
  for (const side of ['top', 'bot']) {
    const baseCy = side === 'top' ? SEED_CY.top : SEED_CY.bot;
    const cy = baseCy + (side === 'top' ? state.adj.topScoreDy : state.adj.botScoreDy);
    ctx.fillText(state[side].r || '', COLS_CX.r + state.adj.rColDx, cy);
    ctx.fillText(state[side].h || '', COLS_CX.h + state.adj.hColDx, cy);
    ctx.fillText(state[side].e || '', COLS_CX.e + state.adj.eColDx, cy);
  }

  // 8. Championship Logo (operator upload OR bundled NCAA default) — drawn
  //     last per spec so it sits on top of the score area when positioned
  //     there. Operator can use the X/Y/Size sliders to move it clear of
  //     the scores if needed.
  const cl = state.champLogo;
  const champImg = (cl && cl.img) || state.layerImgs.championshipLogo;
  if (champImg) {
    const w = (cl.size / 100) * 1080;
    const ar = champImg.naturalWidth / champImg.naturalHeight;
    const h = w / (ar || 1);
    ctx.drawImage(champImg, cl.x - w/2, cl.y - h/2, w, h);
  }
}

// Auto-save: persist the full operator state — schools, seeds, R/H/E,
// uploaded photo (data URL), and position adjustments — to localStorage on
// every change. Reload restores the workflow exactly. Older v1 data
// (positions-only) is read once for migration, then v2 takes over.
const POS_STORAGE_KEY = 'cusa_championship_softball_finalscore_positions_v1';
const STATE_KEY       = 'cusa_championship_softball_finalscore_v2';

function persistState(){
  try {
    const photoSrc     = (state.photo    && state.photo.src)         ? state.photo.src         : null;
    const customBgSrc  = (state.customBg && state.customBg.src)      ? state.customBg.src      : null;
    const champLogoSrc = (state.champLogo && state.champLogo.img && state.champLogo.img.src) ? state.champLogo.img.src : null;
    localStorage.setItem(STATE_KEY, JSON.stringify({
      top: { school: state.top.school, seed: state.top.seed, r: state.top.r, h: state.top.h, e: state.top.e },
      bot: { school: state.bot.school, seed: state.bot.seed, r: state.bot.r, h: state.bot.h, e: state.bot.e },
      photo: photoSrc,
      customBg: customBgSrc,
      hideOverlays: !!state.hideOverlays,
      champLogo: { src: champLogoSrc, x: state.champLogo.x, y: state.champLogo.y, size: state.champLogo.size },
      adj: state.adj,
      // bgVersion 4 = layered asset stack with per-team color block + gradient
      // (programmatic backdrop for schools without a custom championship PNG).
      bgVersion: 4,
    }));
  } catch (_) {}
}
// Hook persistState to also save to Supabase. Must run before the
// `persistPositions` alias is captured so the alias points at the
// hook-wrapped version (we update window.persistState, which is what
// the lexical binding resolves through in a classic script).
if (window.cusaPage) window.cusaPage.hookPersist({ pageKey: 'championship', stateKey: STATE_KEY });
// Back-compat alias for the position-only legacy callers in this file.
const persistPositions = persistState;

function restoreState(){
  // Prefer v2 full state; fall back to v1 positions-only.
  let v2 = null;
  try { const raw = localStorage.getItem(STATE_KEY); if (raw) v2 = JSON.parse(raw); } catch (_) {}
  if (v2 && typeof v2 === 'object') {
    if (v2.top && typeof v2.top === 'object') {
      Object.assign(state.top, v2.top);
      state.top.school = migrateSchoolName(state.top.school);
    }
    if (v2.bot && typeof v2.bot === 'object') {
      Object.assign(state.bot, v2.bot);
      state.bot.school = migrateSchoolName(state.bot.school);
    }
    if (v2.adj && typeof v2.adj === 'object') {
      if (v2.adj.topLogo) Object.assign(state.adj.topLogo, v2.adj.topLogo);
      if (v2.adj.botLogo) Object.assign(state.adj.botLogo, v2.adj.botLogo);
      if (v2.adj.photo)   Object.assign(state.adj.photo,   v2.adj.photo);
      if (v2.adj.topBlock && typeof v2.adj.topBlock === 'object') Object.assign(state.adj.topBlock, v2.adj.topBlock);
      if (v2.adj.botBlock && typeof v2.adj.botBlock === 'object') Object.assign(state.adj.botBlock, v2.adj.botBlock);
      ['topScoreDy','botScoreDy','rColDx','hColDx','eColDx'].forEach(k => {
        if (typeof v2.adj[k] === 'number') state.adj[k] = v2.adj[k];
      });
    }
    if (typeof v2.photo === 'string' && v2.photo) {
      const img = new Image();
      img.onload = () => {
        state.photo = img;
        const zone = document.getElementById('photoZone');
        if (zone) {
          zone.classList.add('loaded');
          document.getElementById('photoZoneText').textContent = '✓ Photo loaded — click to replace';
        }
        draw();
      };
      img.src = v2.photo;
    }
    if (typeof v2.customBg === 'string' && v2.customBg) {
      const img = new Image();
      img.onload = () => {
        state.customBg = img;
        const zone = document.getElementById('bgZone');
        if (zone) {
          zone.classList.add('loaded');
          document.getElementById('bgZoneText').textContent = '✓ Custom BG loaded — click to replace';
        }
        draw();
      };
      img.src = v2.customBg;
    }
    // Only honor stored hideOverlays once the operator has saved state under
    // the bgVersion≥3 schema (layered asset stack). Earlier saves were taken
    // when the default was true (all-in-one BG), so reading them back would
    // suppress the layered overlay/seeds we now ship by default.
    if (typeof v2.hideOverlays === 'boolean' && (v2.bgVersion || 0) >= 3) {
      state.hideOverlays = v2.hideOverlays;
    }
    if (v2.champLogo && typeof v2.champLogo === 'object') {
      if (typeof v2.champLogo.x    === 'number') state.champLogo.x    = v2.champLogo.x;
      if (typeof v2.champLogo.y    === 'number') state.champLogo.y    = v2.champLogo.y;
      if (typeof v2.champLogo.size === 'number') state.champLogo.size = v2.champLogo.size;
      if (typeof v2.champLogo.src  === 'string' && v2.champLogo.src) {
        const img = new Image();
        img.onload = () => {
          state.champLogo.img = img;
          const zone = document.getElementById('champLogoZone');
          if (zone) {
            zone.classList.add('loaded');
            document.getElementById('champLogoZoneText').textContent = '✓ Championship logo loaded — click to replace';
          }
          draw();
        };
        img.src = v2.champLogo.src;
      }
    }
    return;
  }
  // v1 fallback (positions only).
  try {
    const raw = localStorage.getItem(POS_STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (!saved || typeof saved !== 'object') return;
    if (saved.topLogo && typeof saved.topLogo === 'object') Object.assign(state.adj.topLogo, saved.topLogo);
    if (saved.botLogo && typeof saved.botLogo === 'object') Object.assign(state.adj.botLogo, saved.botLogo);
    ['topScoreDy','botScoreDy','rColDx','hColDx','eColDx'].forEach(k => {
      if (typeof saved[k] === 'number') state.adj[k] = saved[k];
    });
  } catch (_) {}
}
const restorePositions = restoreState;

// champLogoX / champLogoY are absolute canvas coords (not nudges), so suppress
// the leading '+' prefix that the other px readouts use for positive values.
const ABS_COORD_IDS = new Set(['champLogoX', 'champLogoY']);
const PCT_SCALE_IDS = new Set(['photoScale', 'champLogoSize', 'topLogoScale', 'botLogoScale']);

function syncSlidersFromState(){
  const m = {
    topLogoDx:     state.adj.topLogo.dx,
    topLogoDy:     state.adj.topLogo.dy,
    topLogoScale:  state.adj.topLogo.scale ?? 100,
    botLogoDx:     state.adj.botLogo.dx,
    botLogoDy:     state.adj.botLogo.dy,
    botLogoScale:  state.adj.botLogo.scale ?? 100,
    topScoreDy:    state.adj.topScoreDy,
    botScoreDy:    state.adj.botScoreDy,
    rColDx:        state.adj.rColDx,
    hColDx:        state.adj.hColDx,
    eColDx:        state.adj.eColDx,
    photoDx:       state.adj.photo?.dx ?? 0,
    photoDy:       state.adj.photo?.dy ?? 0,
    photoScale:    state.adj.photo?.scale ?? 100,
    champLogoX:    state.champLogo.x,
    champLogoY:    state.champLogo.y,
    champLogoSize: state.champLogo.size,
  };
  for (const [id, val] of Object.entries(m)) {
    const inp = document.getElementById(id);
    const ro  = document.getElementById(id + 'R');
    if (inp) inp.value = String(val);
    if (ro) {
      const unit = PCT_SCALE_IDS.has(id) ? '%' : 'px';
      const showPlus = (val >= 0 && unit === 'px' && !ABS_COORD_IDS.has(id));
      ro.textContent = (showPlus ? '+' : '') + val + unit;
    }
  }
}
function syncTextInputsFromState(){
  document.getElementById('topSchool').value = state.top.school;
  document.getElementById('botSchool').value = state.bot.school;
  document.getElementById('topSeed').value   = state.top.seed;
  document.getElementById('botSeed').value   = state.bot.seed;
  document.querySelectorAll('input[data-team][data-stat]').forEach(inp => {
    inp.value = state[inp.dataset.team][inp.dataset.stat];
  });
  const hideCb = document.getElementById('hideOverlays');
  if (hideCb) hideCb.checked = !!state.hideOverlays;

  // Per-side backdrop controls. Color picker shows the override if set,
  // otherwise the school's primary color so the operator can preview it.
  for (const side of ['top','bot']) {
    const blk  = side === 'top' ? state.adj.topBlock : state.adj.botBlock;
    const conf = SCHOOLS.find(s => s.name === state[side].school);
    const colorEl = document.getElementById(side + 'BlockColor');
    const gradEl  = document.getElementById(side + 'BlockGradient');
    const intEl   = document.getElementById(side + 'BlockIntensity');
    const intRo   = document.getElementById(side + 'BlockIntensityR');
    if (colorEl) colorEl.value = (blk.color && blk.color.trim()) || schoolColor(conf);
    if (gradEl)  gradEl.checked = blk.useGradient !== false;
    if (intEl)   intEl.value = String(blk.intensity ?? 100);
    if (intRo)   intRo.textContent = (blk.intensity ?? 100) + '%';
  }
}

// Position-tuning sliders. Each slider updates the corresponding state.adj
// field and re-draws. Readouts show the current px value.
const ADJ_BINDINGS = [
  ['topLogoDx',     v => state.adj.topLogo.dx = v,     'px'],
  ['topLogoDy',     v => state.adj.topLogo.dy = v,     'px'],
  ['topLogoScale',  v => state.adj.topLogo.scale = v,  '%'],
  ['botLogoDx',     v => state.adj.botLogo.dx = v,     'px'],
  ['botLogoDy',     v => state.adj.botLogo.dy = v,     'px'],
  ['botLogoScale',  v => state.adj.botLogo.scale = v,  '%'],
  ['topScoreDy',    v => state.adj.topScoreDy = v,     'px'],
  ['botScoreDy',    v => state.adj.botScoreDy = v,     'px'],
  ['rColDx',        v => state.adj.rColDx = v,         'px'],
  ['hColDx',        v => state.adj.hColDx = v,         'px'],
  ['eColDx',        v => state.adj.eColDx = v,         'px'],
  ['photoDx',       v => state.adj.photo.dx = v,       'px'],
  ['photoDy',       v => state.adj.photo.dy = v,       'px'],
  ['photoScale',    v => state.adj.photo.scale = v,    '%'],
  ['champLogoX',    v => state.champLogo.x = v,        'px'],
  ['champLogoY',    v => state.champLogo.y = v,        'px'],
  ['champLogoSize', v => state.champLogo.size = v,     '%'],
];
ADJ_BINDINGS.forEach(([id, setter, unit]) => {
  const inp = document.getElementById(id);
  if (!inp) return;
  const ro  = document.getElementById(id + 'R');
  inp.addEventListener('input', () => {
    const v = Number(inp.value || 0);
    setter(v);
    if (ro) {
      const showPlus = (v >= 0 && unit === 'px' && !ABS_COORD_IDS.has(id));
      ro.textContent = (showPlus ? '+' : '') + v + unit;
    }
    persistState();
    draw();
  });
});

document.getElementById('resetPositions').addEventListener('click', () => {
  // Preserve per-team backdrop choices (color/gradient/intensity) since those
  // aren't really "positions" — only reset the nudge/scale fields.
  const keepTopBlock = { ...state.adj.topBlock };
  const keepBotBlock = { ...state.adj.botBlock };
  state.adj = {
    topLogo: { dx: 0, dy: 0, scale: 100 }, botLogo: { dx: 0, dy: 0, scale: 100 },
    topScoreDy: 0, botScoreDy: 0,
    rColDx: 0, hColDx: 0, eColDx: 0,
    photo: { dx: 0, dy: 0, scale: 100 },
    topBlock: keepTopBlock,
    botBlock: keepBotBlock,
  };
  syncSlidersFromState();
  persistState();
  draw();
});

document.getElementById('download').addEventListener('click', () => {
  const safe = (s) => (s||'').replace(/[^a-z0-9]+/gi,'_').replace(/^_|_$/g,'') || 'X';
  const fname = `CUSA_Softball_Final_Score_${safe(state.top.school)}_vs_${safe(state.bot.school)}.png`;
  const a = document.createElement('a');
  a.href = cvs.toDataURL('image/png');
  a.download = fname;
  a.click();
});

// ─── Init ─────────────────────────────────────────────────────────────────
(async () => {
  restoreState();
  // schools.json holds 354 D1 schools with IMS logo paths + swatch colors.
  // Fetched before populateSchools so the dropdown has the full list and
  // ensureSchoolLogo can resolve a `primary` filename for non-custom teams.
  await loadSchoolsJson();
  populateSchools();
  syncSlidersFromState();
  syncTextInputsFromState();
  syncBackdropVisibility();
  // Pre-warm fonts so the first paint already has the right glyphs.
  if (document.fonts && document.fonts.load) {
    try { await document.fonts.load('900 50px "Gazzetta Black"'); } catch(_) {}
    try { await document.fonts.load('700 161.59px "Gazzetta ExtraBold"'); } catch(_) {}
  }
  await Promise.all([
    ensureLayer('bg').catch(()=>null),
    ensureLayer('cusaWatermark').catch(()=>null),
    ensureLayer('scoreOverlay').catch(()=>null),
    ensureLayer('scoreBoxes').catch(()=>null),
    ensureLayer('seedsBoxes').catch(()=>null),
    ensureLayer('championshipLogo').catch(()=>null),
    ensureSchoolLogo('top'),
    ensureSchoolLogo('bot'),
  ]);
  draw();
  if (window.cusaPage) window.cusaPage.boot({ pageKey: 'championship', stateKey: STATE_KEY });
})();
</script>
