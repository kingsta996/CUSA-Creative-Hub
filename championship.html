<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CUSA Championship Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;700&display=swap">
<style>
@font-face{font-family:'Proxima Nova';font-weight:700;src:url('fonts/ProximaNovaBold.woff') format('woff'),url('fonts/ProximaNovaBold.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Gazzetta ExtraBold';src:url('fonts/gazzetta-extrabold.otf') format('opentype');font-display:swap}
@font-face{font-family:'Gazzetta Black';src:url('fonts/gazzetta-black.otf') format('opentype');font-display:swap}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Barlow',sans-serif;background:#060f1a;color:#fff}
body{display:flex;flex-direction:column;overflow:hidden}

.topbar{width:100%;background:#0a1624;border-bottom:2px solid rgba(235,25,70,0.5);display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:54px;flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-logo{height:30px;width:auto;display:block;filter:drop-shadow(0 2px 12px rgba(235,25,70,0.25))}
.topbar-sep{width:1px;height:22px;background:rgba(255,255,255,0.2)}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:2px;color:#fff}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-status{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,0.5)}
.topbar-status.error{color:#ff6f8b}
.back{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.6);text-decoration:none;border:1px solid rgba(255,255,255,0.18);padding:7px 12px;border-radius:4px}
.back:hover{color:#fff;border-color:rgba(235,25,70,0.6)}

.tabs{width:100%;background:rgba(10,22,36,0.9);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;gap:0;padding:0 12px;flex-shrink:0}
.tab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.45);text-transform:uppercase;background:transparent;border:none;padding:11px 18px;cursor:pointer;border-bottom:2px solid transparent}
.tab:hover{color:rgba(255,255,255,0.75)}
.tab.active{color:#fff;border-bottom-color:#EB1946}
.tab:disabled{cursor:not-allowed;opacity:0.45}

.main{display:flex;width:100%;gap:14px;padding:12px;flex:1;min-height:0;overflow:hidden}

.panel{background:#0e1d2e;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:14px;width:340px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;overflow-y:auto;height:100%}
.panel-head{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:3px;color:rgba(235,25,70,0.85);text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid rgba(235,25,70,0.18)}

.field{display:flex;flex-direction:column;gap:5px}
.field-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.55);text-transform:uppercase}
.field input[type=text],.field input[type=number],.field select{font-family:'Barlow',sans-serif;font-size:13px;background:#0a1624;color:#fff;border:1px solid rgba(255,255,255,0.18);border-radius:4px;padding:8px 10px;width:100%}
.field input[type=text]:focus,.field input[type=number]:focus,.field select:focus{outline:none;border-color:#EB1946}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.field input[type=range]{width:100%;accent-color:#EB1946}
.nudge-readout{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;color:rgba(235,25,70,0.85);margin-left:6px}

.team-card{border:1px solid rgba(235,25,70,0.18);border-radius:6px;padding:10px 11px;background:rgba(235,25,70,0.04);display:flex;flex-direction:column;gap:8px}
.team-card-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:3px;color:rgba(235,25,70,0.85);text-transform:uppercase}

.upload-zone{display:block;padding:18px;text-align:center;border:2px dashed rgba(235,25,70,0.3);border-radius:4px;cursor:pointer;font-size:11px;font-family:'Barlow Condensed',sans-serif;color:rgba(255,255,255,0.4);letter-spacing:1px;font-weight:700;text-transform:uppercase}
.upload-zone:hover{border-color:rgba(235,25,70,0.55);color:rgba(255,255,255,0.7)}
.upload-zone.loaded{color:#4de08a;border-color:rgba(77,224,138,0.4)}
.upload-zone input{display:none}

.btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;color:#fff;background:#EB1946;border:none;padding:11px 16px;border-radius:4px;cursor:pointer;text-transform:uppercase;width:100%}
.btn:hover{background:#c91240}
.btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.25)}
.btn.secondary:hover{background:rgba(255,255,255,0.06)}
.panel-spacer{flex:1}

.canvas-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0;min-height:0;height:100%;padding:8px}
.canvas-wrap{position:relative;border-radius:4px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.85);height:100%;width:auto;aspect-ratio:1080/1350;max-width:100%;background:#000}
.canvas-wrap canvas{display:block;width:100%;height:100%}
.preview-meta{margin-top:10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.35);text-align:center}
</style>

<body>

<div class="main">

  <!-- Left controls -->
  <div class="panel" id="panel">
    <div class="panel-head">Top Team</div>
    <div class="team-card">
      <div class="row-2">
        <div class="field">
          <label class="field-label" for="topSchool">School</label>

        </div>
        <div class="field">
          <label class="field-label" for="topSeed">Seed</label>

        </div>
      </div>
      <div class="row-3">
        <div class="field"><label class="field-label">R</label><input data-team="top" data-stat="r" type="text" maxlength="3" value="0"></div>
        <div class="field"><label class="field-label">H</label><input data-team="top" data-stat="h" type="text" maxlength="3" value="0"></div>
        <div class="field"><label class="field-label">E</label><input data-team="top" data-stat="e" type="text" maxlength="3" value="0"></div>
      </div>
    </div>

    <div class="panel-head" style="margin-top:6px">Bottom Team</div>
    <div class="team-card">
      <div class="row-2">
        <div class="field">
          <label class="field-label" for="botSchool">School</label>
          <select id="botSchool"></select>
        </div>
        <div class="field">
          <label class="field-label" for="botSeed">Seed</label>
          <input id="botSeed" type="text" maxlength="2" value="2">
        </div>
      </div>
      <div class="row-3">
        <div class="field"><label class="field-label">R</label><input data-team="bot" data-stat="r" type="text" maxlength="3" value="0"></div>
        <div class="field"><label class="field-label">H</label><input data-team="bot" data-stat="h" type="text" maxlength="3" value="0"></div>
        <div class="field"><label class="field-label">E</label><input data-team="bot" data-stat="e" type="text" maxlength="3" value="0"></div>
      </div>
    </div>

    <div class="panel-head" style="margin-top:6px">Photo</div>
    <label class="upload-zone" id="photoZone">
      <input type="file" accept="image/*" onchange="onPhotoUpload(event)">
      <span id="photoZoneText">+ Upload action photo</span>
    </label>
    <button class="btn secondary" id="clearPhotoBtn" style="font-size:10px;padding:8px 10px">Clear photo</button>

    <div class="panel-head" style="margin-top:6px">Position Tuning <span style="font-weight:600;color:rgba(255,255,255,0.35);letter-spacing:1px">· auto-saved</span></div>
    <div class="team-card">
      <div class="team-card-title">Photo</div>
      <div class="row-2">
        <div class="field">
          <label class="field-label">X Nudge <span class="nudge-readout" id="photoDxR">0px</span></label>
          <input id="photoDx" type="range" min="-600" max="600" step="1" value="0">
        </div>
        <div class="field">
          <label class="field-label">Y Nudge <span class="nudge-readout" id="photoDyR">0px</span></label>
          <input id="photoDy" type="range" min="-400" max="400" step="1" value="0">
        </div>
      </div>
      <div class="field">
        <label class="field-label">Zoom <span class="nudge-readout" id="photoScaleR">100%</span></label>
        <input id="photoScale" type="range" min="50" max="250" step="1" value="100">
      </div>
    </div>
    <div class="team-card">
      <div class="team-card-title">Top Logo</div>
      <div class="row-2">
        <div class="field">
          <label class="field-label">X Nudge <span class="nudge-readout" id="topLogoDxR">0px</span></label>
          <input id="topLogoDx" type="range" min="-200" max="200" step="1" value="0">
        </div>
        <div class="field">
          <label class="field-label">Y Nudge <span class="nudge-readout" id="topLogoDyR">0px</span></label>
          <input id="topLogoDy" type="range" min="-200" max="200" step="1" value="0">
        </div>
      </div>
    </div>
    <div class="team-card">
      <div class="team-card-title">Bottom Logo</div>
      <div class="row-2">
        <div class="field">
          <label class="field-label">X Nudge <span class="nudge-readout" id="botLogoDxR">0px</span></label>
          <input id="botLogoDx" type="range" min="-200" max="200" step="1" value="0">
        </div>
        <div class="field">
          <label class="field-label">Y Nudge <span class="nudge-readout" id="botLogoDyR">0px</span></label>
          <input id="botLogoDy" type="range" min="-200" max="200" step="1" value="0">
        </div>
      </div>
    </div>
    <div class="team-card">
      <div class="team-card-title">R / H / E Numbers</div>
      <div class="row-2">
        <div class="field">
          <label class="field-label">Top Row Y <span class="nudge-readout" id="topScoreDyR">0px</span></label>
          <input id="topScoreDy" type="range" min="-200" max="200" step="1" value="0">
        </div>
        <div class="field">
          <label class="field-label">Bot Row Y <span class="nudge-readout" id="botScoreDyR">0px</span></label>
          <input id="botScoreDy" type="range" min="-200" max="200" step="1" value="0">
        </div>
      </div>
      <div class="row-3">
        <div class="field">
          <label class="field-label">R Col X <span class="nudge-readout" id="rColDxR">0px</span></label>
          <input id="rColDx" type="range" min="-200" max="200" step="1" value="0">
        </div>
        <div class="field">
          <label class="field-label">H Col X <span class="nudge-readout" id="hColDxR">0px</span></label>
          <input id="hColDx" type="range" min="-200" max="200" step="1" value="0">
        </div>
        <div class="field">
          <label class="field-label">E Col X <span class="nudge-readout" id="eColDxR">0px</span></label>
          <input id="eColDx" type="range" min="-200" max="200" step="1" value="0">
        </div>
      </div>
    </div>
    <button id="resetPositions" class="btn secondary" style="font-size:10px;padding:8px 10px">Reset All Positions</button>

    <div class="panel-spacer"></div>
    <button class="btn" id="download">Download PNG</button>
  </div>

  <!-- Center preview -->
  <div class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="cvs" width="1080" height="1350"></canvas>
    </div>
    <div class="preview-meta">1080 × 1350  ·  Final Score · Softball Championship</div>
  </div>

</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────
const ASSET_DIR = 'championship/softball-final-score/';
const SCHOOLS = [
  // Logos available in this Final Score asset set (8 of the 9 host + 2 affiliates).
  { id:'Delaware',          file:'26 SB Final Score - Delaware.png' },
  { id:'FIU',               file:'26 SB Final Score - FIU.png' },
  { id:'Jax State',         file:'26 SB Final Score - Jax State.png' },
  { id:'LA Tech',           file:'26 SB Final Score - LA Tech.png' },
  { id:'Liberty',           file:'26 SB Final Score - Liberty.png' },
  { id:'New Mexico State',  file:'26 SB Final Score - New Mexico State.png' },
  { id:'Sam Houston',       file:'26 SB Final Score - SHSU.png' },
  { id:'Western Kentucky',  file:'26 SB Final Score - WKU.png' },
];

// Layer assets (loaded once)
const LAYERS = {
  bg:            ASSET_DIR + '26 SB Final Score - BG.png',
  cusaWatermark: ASSET_DIR + '26 SB Final Score - CUSA Logo Overlay.png',
  scoreBox:      ASSET_DIR + '26 SB Final Score - Score Box.png',
  scoreOverlay:  ASSET_DIR + '26 SB Final Score - Score Overlay.png',
  seedsBoxes:    ASSET_DIR + '26 SB Final Score - Seeds Boxes.png',
};

// Geometry (1080×1350 source coords; measured from the reference PNGs).
// The Score Box PNG has an 11-pixel anti-aliased drop shadow above its
// solid body (alpha ramps y=697..707, then full-opaque body at y=708).
// Stopping the photo at y=697 left that shadow ramp visible as a thin
// gap against the photo bottom. Extending the photo down to y=708 puts
// the shadow ON the photo so the transition reads as a single continuous
// edge against the gray FINAL SCORE banner — no gap.
//   - Score Box outer bbox: x=19..1060, y=697..1330 (incl. shadow)
//   - Score Box solid body: x=30..1049, y=708..1319
const PHOTO_AREA = { x: 19, y: 15, w: 1042, h: 693 };
const TEAM_LOGO  = { w: 251, h: 166, x: 36, topY: 924, botY: 1093 };  // top-left corners
const SEED_CY    = { top: 1007, bot: 1176 };
const SEED_CX    = 56;
const COLS_CX    = { r: 414, h: 668, e: 923 };  // R / H / E column centers
const SEED_FONT  = '900 50px "Gazzetta Black","Barlow Condensed",sans-serif';
const SCORE_FONT = '700 161.59px "Gazzetta ExtraBold","Barlow Condensed",sans-serif';
const NAVY       = '#082338';
const WHITE      = '#FFFFFF';

// ─── State ────────────────────────────────────────────────────────────────
const state = {
  top: { school: SCHOOLS[4].id, seed: '1', r: '0', h: '0', e: '0', logoImg: null },
  bot: { school: SCHOOLS[6].id, seed: '2', r: '0', h: '0', e: '0', logoImg: null },
  photo: null,
  layerImgs: {},
  // Per-element nudges. Logos shift by (dx, dy); the score row Ys nudge the
  // R/H/E values vertically per row, and each column has its own X offset
  // applied to BOTH rows so columns align even after fine-tuning.
  adj: {
    topLogo:  { dx: 0, dy: 0 },
    botLogo:  { dx: 0, dy: 0 },
    topScoreDy: 0,
    botScoreDy: 0,
    rColDx: 0,
    hColDx: 0,
    eColDx: 0,
    photo: { dx: 0, dy: 0, scale: 100 },
  },
};

const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const topStatus = document.getElementById('topStatus');

function setStatus(msg, isErr){
  topStatus.textContent = msg || '';
  topStatus.classList.toggle('error', !!isErr);
}

// ─── Image loading ────────────────────────────────────────────────────────
const imgCache = new Map();
function loadImage(src){
  if (imgCache.has(src)) return imgCache.get(src);
  const p = new Promise((resolve, reject) => {
    const img = new Image();
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error('Image load failed: ' + src));
    img.src = src;
  });
  imgCache.set(src, p);
  return p;
}

async function ensureLayer(key){
  if (state.layerImgs[key]) return state.layerImgs[key];
  state.layerImgs[key] = await loadImage(encodeURI(LAYERS[key]));
  return state.layerImgs[key];
}

async function ensureSchoolLogo(side){
  const sObj = state[side];
  const conf = SCHOOLS.find(s => s.id === sObj.school);
  if (!conf) { sObj.logoImg = null; return null; }
  try {
    sObj.logoImg = await loadImage(encodeURI(ASSET_DIR + conf.file));
  } catch (e) {
    sObj.logoImg = null;
    setStatus('Could not load logo for ' + sObj.school, true);
  }
  return sObj.logoImg;
}

// ─── Photo upload (cover-fit into PHOTO_AREA) ─────────────────────────────
function onPhotoUpload(e){
  const file = e.target.files[0];
  if (!file) return;
  const fr = new FileReader();
  fr.onload = ev => {
    const img = new Image();
    img.onload = () => {
      state.photo = img;
      document.getElementById('photoZone').classList.add('loaded');
      document.getElementById('photoZoneText').textContent = '✓ Photo loaded — click to replace';
      persistState();
      draw();
    };
    img.src = ev.target.result;
  };
  fr.readAsDataURL(file);
}
document.getElementById('clearPhotoBtn').addEventListener('click', () => {
  state.photo = null;
  document.getElementById('photoZone').classList.remove('loaded');
  document.getElementById('photoZoneText').textContent = '+ Upload action photo';
  document.querySelector('#photoZone input').value = '';
  persistState();
  draw();
});

// ─── Render ───────────────────────────────────────────────────────────────
function drawCoverFit(img, x, y, w, h, nudgeDx, nudgeDy, scale){
  const s = (scale ?? 100) / 100;
  const ar = img.naturalWidth / img.naturalHeight;
  const tar = w / h;
  let dx, dy, dw, dh;
  if (ar > tar) {
    dh = h * s;
    dw = h * s * ar;
    dx = x - (dw - w) / 2;
    dy = y - (dh - h) / 2;
  } else {
    dw = w * s;
    dh = w * s / ar;
    dx = x - (dw - w) / 2;
    dy = y - (dh - h) / 2;
  }
  dx += (nudgeDx || 0);
  dy += (nudgeDy || 0);
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  ctx.drawImage(img, dx, dy, dw, dh);
  ctx.restore();
}

async function draw(){
  ctx.clearRect(0, 0, 1080, 1350);

  // 1. BG (full canvas)
  try { ctx.drawImage(await ensureLayer('bg'), 0, 0, 1080, 1350); }
  catch (e) { ctx.fillStyle = '#0a1628'; ctx.fillRect(0,0,1080,1350); console.error(e); }

  // 2. Photo (clipped to photo area, with operator-controlled nudge + zoom)
  if (state.photo) {
    const p = state.adj.photo || {};
    drawCoverFit(state.photo, PHOTO_AREA.x, PHOTO_AREA.y, PHOTO_AREA.w, PHOTO_AREA.h,
      p.dx || 0, p.dy || 0, p.scale ?? 100);
  } else {
    // Placeholder: dim rectangle + hint
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(PHOTO_AREA.x, PHOTO_AREA.y, PHOTO_AREA.w, PHOTO_AREA.h);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '800 28px "Barlow Condensed",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('UPLOAD AN ACTION PHOTO', PHOTO_AREA.x + PHOTO_AREA.w/2, PHOTO_AREA.y + PHOTO_AREA.h/2);
  }

  // 3. CUSA Logo Overlay watermark — translucent CUSA mark in the upper-right
  //     of the photo area. Sits ON TOP of the photo so it brands every photo
  //     uploaded; under the score box / team logos so it never obscures them.
  try { ctx.drawImage(await ensureLayer('cusaWatermark'), 0, 0, 1080, 1350); } catch (_) {}

  // 4. Score Box (FINAL SCORE banner + dark navy body — provides the substrate
  //     the team logos sit on). Drawn between Photo and Team Logos so the
  //     logos render on top of the navy background.
  try { ctx.drawImage(await ensureLayer('scoreBox'), 0, 0, 1080, 1350); } catch (_) {}

  // 5. Team logos (with per-team X/Y nudge)
  if (state.top.logoImg) {
    ctx.drawImage(state.top.logoImg,
      TEAM_LOGO.x + state.adj.topLogo.dx,
      TEAM_LOGO.topY + state.adj.topLogo.dy,
      TEAM_LOGO.w, TEAM_LOGO.h);
  }
  if (state.bot.logoImg) {
    ctx.drawImage(state.bot.logoImg,
      TEAM_LOGO.x + state.adj.botLogo.dx,
      TEAM_LOGO.botY + state.adj.botLogo.dy,
      TEAM_LOGO.w, TEAM_LOGO.h);
  }

  // 6. Score Overlay (C-USA + R/H/E label strip + column dividers)
  try { ctx.drawImage(await ensureLayer('scoreOverlay'), 0, 0, 1080, 1350); } catch (_) {}

  // 7. Seed Boxes (small light-gray squares to the left of each team logo)
  try { ctx.drawImage(await ensureLayer('seedsBoxes'), 0, 0, 1080, 1350); } catch (_) {}

  // ── Text overlays ──
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Seeds (Gazzetta Black 50pt navy)
  ctx.fillStyle = NAVY;
  ctx.font = SEED_FONT;
  ctx.fillText(state.top.seed || '', SEED_CX, SEED_CY.top);
  ctx.fillText(state.bot.seed || '', SEED_CX, SEED_CY.bot);

  // R / H / E values (Gazzetta ExtraBold 161.59pt white). Each row gets a
  // shared Y nudge; each column has its own X nudge applied to both rows.
  ctx.fillStyle = WHITE;
  ctx.font = SCORE_FONT;
  for (const side of ['top', 'bot']) {
    const baseCy = side === 'top' ? SEED_CY.top : SEED_CY.bot;
    const cy = baseCy + (side === 'top' ? state.adj.topScoreDy : state.adj.botScoreDy);
    ctx.fillText(state[side].r || '', COLS_CX.r + state.adj.rColDx, cy);
    ctx.fillText(state[side].h || '', COLS_CX.h + state.adj.hColDx, cy);
    ctx.fillText(state[side].e || '', COLS_CX.e + state.adj.eColDx, cy);
  }
}

// ─── Wire-up ──────────────────────────────────────────────────────────────
function populateSchools(){
  const opts = SCHOOLS.map(s => `<option value="${s.id}">${s.id}</option>`).join('');
  document.getElementById('topSchool').innerHTML = opts;
  document.getElementById('botSchool').innerHTML = opts;
  document.getElementById('topSchool').value = state.top.school;
  document.getElementById('botSchool').value = state.bot.school;
}

document.getElementById('topSchool').addEventListener('change', async e => {
  state.top.school = e.target.value;
  await ensureSchoolLogo('top');
  persistState();
  draw();
});
document.getElementById('botSchool').addEventListener('change', async e => {
  state.bot.school = e.target.value;
  await ensureSchoolLogo('bot');
  persistState();
  draw();
});
document.getElementById('topSeed').addEventListener('input', e => { state.top.seed = e.target.value; persistState(); draw(); });
document.getElementById('botSeed').addEventListener('input', e => { state.bot.seed = e.target.value; persistState(); draw(); });
document.querySelectorAll('input[data-team][data-stat]').forEach(inp => {
  inp.addEventListener('input', e => {
    state[e.target.dataset.team][e.target.dataset.stat] = e.target.value;
    persistState();
    draw();
  });
});

// Auto-save: persist the full operator state — schools, seeds, R/H/E,
// uploaded photo (data URL), and position adjustments — to localStorage on
// every change. Reload restores the workflow exactly. Older v1 data
// (positions-only) is read once for migration, then v2 takes over.
const POS_STORAGE_KEY = 'cusa_championship_softball_finalscore_positions_v1';
const STATE_KEY       = 'cusa_championship_softball_finalscore_v2';

function persistState(){
  try {
    const photoSrc = (state.photo && state.photo.src) ? state.photo.src : null;
    localStorage.setItem(STATE_KEY, JSON.stringify({
      top: { school: state.top.school, seed: state.top.seed, r: state.top.r, h: state.top.h, e: state.top.e },
      bot: { school: state.bot.school, seed: state.bot.seed, r: state.bot.r, h: state.bot.h, e: state.bot.e },
      photo: photoSrc,
      adj: state.adj,
    }));
  } catch (_) {}
}
// Hook persistState to also save to Supabase. Must run before the
// `persistPositions` alias is captured so the alias points at the
// hook-wrapped version (we update window.persistState, which is what
// the lexical binding resolves through in a classic script).
if (window.cusaPage) window.cusaPage.hookPersist({ pageKey: 'championship', stateKey: STATE_KEY });
// Back-compat alias for the position-only legacy callers in this file.
const persistPositions = persistState;

function restoreState(){
  // Prefer v2 full state; fall back to v1 positions-only.
  let v2 = null;
  try { const raw = localStorage.getItem(STATE_KEY); if (raw) v2 = JSON.parse(raw); } catch (_) {}
  if (v2 && typeof v2 === 'object') {
    if (v2.top && typeof v2.top === 'object') Object.assign(state.top, v2.top);
    if (v2.bot && typeof v2.bot === 'object') Object.assign(state.bot, v2.bot);
    if (v2.adj && typeof v2.adj === 'object') {
      if (v2.adj.topLogo) Object.assign(state.adj.topLogo, v2.adj.topLogo);
      if (v2.adj.botLogo) Object.assign(state.adj.botLogo, v2.adj.botLogo);
      if (v2.adj.photo)   Object.assign(state.adj.photo,   v2.adj.photo);
      ['topScoreDy','botScoreDy','rColDx','hColDx','eColDx'].forEach(k => {
        if (typeof v2.adj[k] === 'number') state.adj[k] = v2.adj[k];
      });
    }
    if (typeof v2.photo === 'string' && v2.photo) {
      const img = new Image();
      img.onload = () => {
        state.photo = img;
        const zone = document.getElementById('photoZone');
        if (zone) {
          zone.classList.add('loaded');
          document.getElementById('photoZoneText').textContent = '✓ Photo loaded — click to replace';
        }
        draw();
      };
      img.src = v2.photo;
    }
    return;
  }
  // v1 fallback (positions only).
  try {
    const raw = localStorage.getItem(POS_STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (!saved || typeof saved !== 'object') return;
    if (saved.topLogo && typeof saved.topLogo === 'object') Object.assign(state.adj.topLogo, saved.topLogo);
    if (saved.botLogo && typeof saved.botLogo === 'object') Object.assign(state.adj.botLogo, saved.botLogo);
    ['topScoreDy','botScoreDy','rColDx','hColDx','eColDx'].forEach(k => {
      if (typeof saved[k] === 'number') state.adj[k] = saved[k];
    });
  } catch (_) {}
}
const restorePositions = restoreState;

function syncSlidersFromState(){
  const m = {
    topLogoDx:  state.adj.topLogo.dx,
    topLogoDy:  state.adj.topLogo.dy,
    botLogoDx:  state.adj.botLogo.dx,
    botLogoDy:  state.adj.botLogo.dy,
    topScoreDy: state.adj.topScoreDy,
    botScoreDy: state.adj.botScoreDy,
    rColDx:     state.adj.rColDx,
    hColDx:     state.adj.hColDx,
    eColDx:     state.adj.eColDx,
    photoDx:    state.adj.photo?.dx ?? 0,
    photoDy:    state.adj.photo?.dy ?? 0,
    photoScale: state.adj.photo?.scale ?? 100,
  };
  for (const [id, val] of Object.entries(m)) {
    const inp = document.getElementById(id);
    const ro  = document.getElementById(id + 'R');
    if (inp) inp.value = String(val);
    if (ro) {
      const unit = id === 'photoScale' ? '%' : 'px';
      ro.textContent = (val >= 0 && unit === 'px' ? '+' : '') + val + unit;
    }
  }
}
function syncTextInputsFromState(){
  document.getElementById('topSchool').value = state.top.school;
  document.getElementById('botSchool').value = state.bot.school;
  document.getElementById('topSeed').value   = state.top.seed;
  document.getElementById('botSeed').value   = state.bot.seed;
  document.querySelectorAll('input[data-team][data-stat]').forEach(inp => {
    inp.value = state[inp.dataset.team][inp.dataset.stat];
  });
}

// Position-tuning sliders. Each slider updates the corresponding state.adj
// field and re-draws. Readouts show the current px value.
const ADJ_BINDINGS = [
  ['topLogoDx',  v => state.adj.topLogo.dx = v, 'px'],
  ['topLogoDy',  v => state.adj.topLogo.dy = v, 'px'],
  ['botLogoDx',  v => state.adj.botLogo.dx = v, 'px'],
  ['botLogoDy',  v => state.adj.botLogo.dy = v, 'px'],
  ['topScoreDy', v => state.adj.topScoreDy = v, 'px'],
  ['botScoreDy', v => state.adj.botScoreDy = v, 'px'],
  ['rColDx',     v => state.adj.rColDx = v, 'px'],
  ['hColDx',     v => state.adj.hColDx = v, 'px'],
  ['eColDx',     v => state.adj.eColDx = v, 'px'],
  ['photoDx',    v => state.adj.photo.dx = v, 'px'],
  ['photoDy',    v => state.adj.photo.dy = v, 'px'],
  ['photoScale', v => state.adj.photo.scale = v, '%'],
];
ADJ_BINDINGS.forEach(([id, setter, unit]) => {
  const inp = document.getElementById(id);
  if (!inp) return;
  const ro  = document.getElementById(id + 'R');
  inp.addEventListener('input', () => {
    const v = Number(inp.value || 0);
    setter(v);
    if (ro) ro.textContent = (v >= 0 && unit === 'px' ? '+' : '') + v + unit;
    persistState();
    draw();
  });
});

document.getElementById('resetPositions').addEventListener('click', () => {
  state.adj = {
    topLogo: { dx: 0, dy: 0 }, botLogo: { dx: 0, dy: 0 },
    topScoreDy: 0, botScoreDy: 0,
    rColDx: 0, hColDx: 0, eColDx: 0,
    photo: { dx: 0, dy: 0, scale: 100 },
  };
  syncSlidersFromState();
  persistState();
  draw();
});

document.getElementById('download').addEventListener('click', () => {
  const safe = (s) => (s||'').replace(/[^a-z0-9]+/gi,'_').replace(/^_|_$/g,'') || 'X';
  const fname = `CUSA_Softball_Final_Score_${safe(state.top.school)}_vs_${safe(state.bot.school)}.png`;
  const a = document.createElement('a');
  a.href = cvs.toDataURL('image/png');
  a.download = fname;
  a.click();
});

// ─── Init ─────────────────────────────────────────────────────────────────
(async () => {
  restoreState();
  populateSchools();
  syncSlidersFromState();
  syncTextInputsFromState();
  // Pre-warm fonts so the first paint already has the right glyphs.
  if (document.fonts && document.fonts.load) {
    try { await document.fonts.load('900 50px "Gazzetta Black"'); } catch(_) {}
    try { await document.fonts.load('700 161.59px "Gazzetta ExtraBold"'); } catch(_) {}
  }
  await Promise.all([
    ensureLayer('bg').catch(()=>null),
    ensureLayer('cusaWatermark').catch(()=>null),
    ensureLayer('scoreBox').catch(()=>null),
    ensureLayer('scoreOverlay').catch(()=>null),
    ensureLayer('seedsBoxes').catch(()=>null),
    ensureSchoolLogo('top'),
    ensureSchoolLogo('bot'),
  ]);
  draw();
  if (window.cusaPage) window.cusaPage.boot({ pageKey: 'championship', stateKey: STATE_KEY });
})();
</script>
