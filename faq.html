<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Hub — FAQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap">
<style>
  :root { --red:#EB1946; --bg:#060f1a; --panel:rgba(255,255,255,0.04); --line:rgba(255,255,255,0.1); --mute:rgba(255,255,255,0.55); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: #fff; font-family: 'Barlow', sans-serif; min-height: 100vh; padding: 32px 20px 60px; }
  .wrap { max-width: 860px; margin: 0 auto; }
  .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; flex-wrap: wrap; gap: 10px; }
  .top h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
  .top h1 small { display: block; font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.35); margin-bottom: 4px; font-weight: 800; }
  .back { color: var(--red); text-decoration: none; font-size: 12px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1.5px; text-transform: uppercase; }
  .back:hover { color: #fff; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
  .toolbar input, .toolbar select { background: var(--panel); color: #fff; border: 1px solid var(--line); border-radius: 8px; padding: 9px 12px; font-size: 13px; font-family: inherit; }
  .toolbar input { flex: 1; min-width: 180px; }
  .toolbar input:focus, .toolbar select:focus { outline: 0; border-color: var(--red); }
  .meta { color: var(--mute); font-size: 11px; margin-bottom: 10px; letter-spacing: 0.5px; }
  .group { margin-bottom: 26px; }
  .group h2 { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--red); margin-bottom: 10px; font-weight: 800; padding-bottom: 6px; border-bottom: 1px solid rgba(235,25,70,0.18); }
  details.faq { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px; transition: border-color 0.15s; }
  details.faq[open] { border-color: rgba(235,25,70,0.4); background: rgba(235,25,70,0.05); }
  details.faq summary { list-style: none; padding: 12px 16px; cursor: pointer; font-size: 14px; font-weight: 600; display: flex; gap: 10px; align-items: center; }
  details.faq summary::-webkit-details-marker { display: none; }
  details.faq summary::before { content: '▸'; color: var(--red); transition: transform 0.15s; font-size: 11px; }
  details.faq[open] summary::before { transform: rotate(90deg); }
  details.faq summary .q { flex: 1; }
  details.faq summary .slug-pill { font-size: 9.5px; color: var(--mute); font-family: 'SF Mono', 'Menlo', monospace; background: rgba(255,255,255,0.05); padding: 2px 7px; border-radius: 4px; letter-spacing: 0.4px; }
  details.faq .answer { padding: 0 16px 16px 30px; font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.85); white-space: pre-wrap; word-wrap: break-word; }
  details.faq .answer a { color: var(--red); }
  details.faq:target { border-color: var(--red); box-shadow: 0 0 0 2px rgba(235,25,70,0.25); }
  .empty { text-align: center; padding: 60px 20px; color: var(--mute); background: var(--panel); border: 1px dashed var(--line); border-radius: 12px; }
  .empty h3 { font-size: 15px; color: #fff; margin-bottom: 6px; }
  .footer { margin-top: 50px; text-align: center; color: rgba(255,255,255,0.3); font-size: 10px; letter-spacing: 1.4px; text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; }
  .footer a { color: rgba(255,255,255,0.5); text-decoration: none; }
  .footer a:hover { color: #fff; }
</style>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1><small>Creative Hub</small>Frequently Asked Questions</h1>
    <a class="back" href="index.html">← Hub Home</a>
  </div>
  <div class="toolbar">
    <input id="faqSearch" placeholder="Search questions, answers, keywords…" type="search" autofocus>
    <select id="faqCategory"><option value="">All categories</option></select>
  </div>
  <div class="meta" id="faqMeta">Loading…</div>
  <div id="faqList"></div>
  <div class="footer">CONFERENCE USA · GRAPHIC BUILDER HUB &nbsp;·&nbsp; <a href="index.html">Hub Home</a> &nbsp;·&nbsp; <a href="mailto:kking@conferenceusa.com">Contact Keith</a></div>
</div>
<script>
  var APP_KEY = 'creative_hub';
  var _all = [];
  var _db = null;
  function db() {
    if (_db) return _db;
    if (typeof supabase !== 'undefined' && window.SUPABASE_URL && window.SUPABASE_ANON_KEY) {
      _db = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    }
    return _db;
  }
  function escHtml(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function renderAnswer(text) {
    var html = escHtml(text);
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function (_, t, u) {
      return '<a href="' + escHtml(u) + '" target="_blank" rel="noopener">' + escHtml(t) + '</a>';
    });
    html = html.replace(/(^|[\s(])((?:https?:\/\/)[^\s)<]+)/g, function (_, lead, u) {
      return lead + '<a href="' + escHtml(u) + '" target="_blank" rel="noopener">' + escHtml(u) + '</a>';
    });
    return html;
  }
  async function loadFaq() {
    var meta = document.getElementById('faqMeta');
    var d = db();
    if (!d) { meta.textContent = 'Database not available — open this page on the live site.'; return; }
    try {
      var resp = await d.from('chat_faq')
        .select('slug, app, category, question, answer, keywords, view_count, updated_at')
        .in('app', [APP_KEY, 'both'])
        .eq('is_active', true)
        .order('sort_order', { ascending: true })
        .order('category', { ascending: true })
        .order('created_at', { ascending: true });
      if (resp.error) throw resp.error;
      _all = resp.data || [];
      buildCategoryDropdown();
      render();
      var hash = (location.hash || '').replace(/^#/, '');
      if (hash) {
        var el = document.getElementById('faq-' + hash);
        if (el) {
          el.setAttribute('open', '');
          setTimeout(function () { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 60);
          incrementViewCount(hash);
        }
      }
    } catch (e) { meta.textContent = 'Failed to load FAQ: ' + (e.message || e); }
  }
  function buildCategoryDropdown() {
    var sel = document.getElementById('faqCategory');
    var cats = {};
    _all.forEach(function (f) { var c = (f.category || 'General').trim(); cats[c] = true; });
    var keys = Object.keys(cats).sort();
    sel.innerHTML = '<option value="">All categories</option>' + keys.map(function (k) { return '<option value="' + escHtml(k) + '">' + escHtml(k) + '</option>'; }).join('');
  }
  function matches(f, q) {
    if (!q) return true;
    var hay = ((f.question || '') + ' ' + (f.answer || '') + ' ' + ((f.keywords || []).join(' ')) + ' ' + (f.category || '')).toLowerCase();
    return q.toLowerCase().split(/\s+/).every(function (t) { return !t || hay.indexOf(t) !== -1; });
  }
  function render() {
    var q = document.getElementById('faqSearch').value.trim();
    var cat = document.getElementById('faqCategory').value;
    var list = _all.filter(function (f) {
      if (cat && (f.category || 'General').trim() !== cat) return false;
      if (!matches(f, q)) return false;
      return true;
    });
    var meta = document.getElementById('faqMeta');
    var root = document.getElementById('faqList');
    if (!list.length) {
      meta.textContent = '0 entries';
      root.innerHTML = '<div class="empty"><h3>No matching FAQ entries</h3><div>Try a different search, or ask the support chat on the Hub home and Keith will curate the answer here.</div></div>';
      return;
    }
    meta.textContent = list.length + ' entr' + (list.length === 1 ? 'y' : 'ies');
    var groups = {};
    list.forEach(function (f) { var c = (f.category || 'General').trim(); (groups[c] = groups[c] || []).push(f); });
    var out = '';
    Object.keys(groups).sort().forEach(function (c) {
      out += '<div class="group"><h2>' + escHtml(c) + '</h2>';
      groups[c].forEach(function (f) {
        out += '<details class="faq" id="faq-' + escHtml(f.slug) + '" data-slug="' + escHtml(f.slug) + '">' +
          '<summary><span class="q">' + escHtml(f.question) + '</span><span class="slug-pill">' + escHtml(f.slug) + '</span></summary>' +
          '<div class="answer">' + renderAnswer(f.answer || '') + '</div></details>';
      });
      out += '</div>';
    });
    root.innerHTML = out;
    root.querySelectorAll('details.faq').forEach(function (d) {
      d.addEventListener('toggle', function () { if (d.open) incrementViewCount(d.dataset.slug); });
    });
  }
  function incrementViewCount(slug) {
    var d = db(); if (!d || !slug) return;
    d.from('chat_faq').select('view_count').eq('slug', slug).maybeSingle().then(function (r) {
      var n = (r && r.data && r.data.view_count) || 0;
      d.from('chat_faq').update({ view_count: n + 1 }).eq('slug', slug).then(function () {});
    });
  }
  document.getElementById('faqSearch').addEventListener('input', render);
  document.getElementById('faqCategory').addEventListener('change', render);
  window.addEventListener('hashchange', function () {
    var hash = (location.hash || '').replace(/^#/, '');
    if (hash) {
      var el = document.getElementById('faq-' + hash);
      if (el) { el.setAttribute('open', ''); el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
    }
  });
  loadFaq();
</script>
</body>
</html>
