<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CUSA Championship · Game Day Builder (Universal)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;700&display=swap">
<style>
@font-face{font-family:'Proxima Nova';font-weight:400;src:url('fonts/ProximaNovaRegular.woff') format('woff'),url('fonts/ProximaNovaRegular.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Proxima Nova';font-weight:700;src:url('fonts/ProximaNovaBold.woff') format('woff'),url('fonts/ProximaNovaBold.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Proxima Nova';font-weight:900;src:url('fonts/ProximaNovaBlack.woff') format('woff'),url('fonts/ProximaNovaBlack.ttf') format('truetype');font-display:swap}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Barlow',sans-serif;background:#060f1a;color:#fff}
body{display:flex;flex-direction:column;overflow:hidden}

.topbar{width:100%;background:#0a1624;border-bottom:2px solid rgba(235,25,70,0.5);display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:54px;flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-logo{height:30px;width:auto;display:block;filter:drop-shadow(0 2px 12px rgba(235,25,70,0.25))}
.topbar-sep{width:1px;height:22px;background:rgba(255,255,255,0.2)}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:2px;color:#fff}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-status{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,0.5)}
.topbar-status.error{color:#ff6f8b}
.back{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.6);text-decoration:none;border:1px solid rgba(255,255,255,0.18);padding:7px 12px;border-radius:4px}
.back:hover{color:#fff;border-color:rgba(235,25,70,0.6)}

.tabs{width:100%;background:rgba(10,22,36,0.9);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;gap:0;padding:0 12px;flex-shrink:0}
.tab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.45);text-transform:uppercase;background:transparent;border:none;padding:11px 18px;cursor:pointer;border-bottom:2px solid transparent;text-decoration:none}
.tab:hover{color:rgba(255,255,255,0.75)}
.tab.active{color:#fff;border-bottom-color:#EB1946}

.main{display:flex;width:100%;gap:14px;padding:12px;flex:1;min-height:0;overflow:hidden}

.panel{background:#0e1d2e;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:14px;width:340px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;overflow-y:auto;height:100%}
.panel-head{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:3px;color:rgba(235,25,70,0.85);text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid rgba(235,25,70,0.18)}

.field{display:flex;flex-direction:column;gap:5px}
.field-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.55);text-transform:uppercase}
.field input[type=text],.field input[type=number],.field select{font-family:'Barlow',sans-serif;font-size:13px;background:#0a1624;color:#fff;border:1px solid rgba(255,255,255,0.18);border-radius:4px;padding:8px 10px;width:100%}
.field input[type=text]:focus,.field input[type=number]:focus,.field select:focus{outline:none;border-color:#EB1946}
.field input[type=range]{width:100%;accent-color:#EB1946}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

.team-card{border:1px solid rgba(235,25,70,0.18);border-radius:6px;padding:10px 11px;background:rgba(235,25,70,0.04);display:flex;flex-direction:column;gap:8px}
.team-card-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:3px;color:rgba(235,25,70,0.85);text-transform:uppercase}

.upload-zone{display:block;padding:14px;text-align:center;border:2px dashed rgba(235,25,70,0.3);border-radius:4px;cursor:pointer;font-size:11px;font-family:'Barlow Condensed',sans-serif;color:rgba(255,255,255,0.4);letter-spacing:1px;font-weight:700;text-transform:uppercase}
.upload-zone:hover{border-color:rgba(235,25,70,0.55);color:rgba(255,255,255,0.7)}
.upload-zone.loaded{color:#4de08a;border-color:rgba(77,224,138,0.4)}
.upload-zone input{display:none}

.nudge-readout{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;color:rgba(235,25,70,0.85);margin-left:6px}

.btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;color:#fff;background:#EB1946;border:none;padding:11px 16px;border-radius:4px;cursor:pointer;text-transform:uppercase;width:100%}
.btn:hover{background:#c91240}
.btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.25)}
.btn.secondary:hover{background:rgba(255,255,255,0.06)}
.panel-spacer{flex:1}

.canvas-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0;min-height:0;height:100%;padding:8px}
.canvas-wrap{position:relative;border-radius:4px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.85);height:100%;width:auto;aspect-ratio:1080/1350;max-width:100%;background:#000}
.canvas-wrap canvas{display:block;width:100%;height:100%}
.preview-meta{margin-top:10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.35);text-align:center}
</style>

<div class="main">

  <!-- Left controls -->

    <div class="panel-head">Sport</div>
    <div class="field">

<script>
// ─── Config ───────────────────────────────────────────────────────────────
const ASSET_DIR = 'championship/softball-game-day/';

const SCHOOLS = [
  { id:'Delaware',          file:'26 SB Gameday Post - Delaware.png' },
  { id:'FIU',               file:'26 SB Gameday Post - FIU.png' },
  { id:'Jacksonville State',file:'26 SB Gameday Post - Jacksonville State.png' },
  { id:'LA Tech',           file:'26 SB Gameday Post - LA Tech.png' },
  { id:'Liberty',           file:'26 SB Gameday Post - Liberty.png' },
  { id:'New Mexico State',  file:'26 SB Gameday Post - New Mexico State.png' },
  { id:'Sam Houston',       file:'26 SB Gameday Post - SHSU.png' },
  { id:'Western Kentucky',  file:'26 SB Gameday Post - WKU.png' },
];

const LAYERS = {
  bg:             ASSET_DIR + '26 SB Gameday Post - BG.png',
  redBar:         ASSET_DIR + '26 SB Gameday Post - Red Bar.png',
  seedingOverlay: ASSET_DIR + '26 SB Gameday Post - Seeding Overlay.png',
  // champLogoSplit is sport-specific; SPORT_CONFIG drives which file is used.
};

// Sport config — switching sports swaps the championship medallion artwork
// AND the default headline copy. The default headline is only auto-applied
// if the operator hasn't customized it (we treat the default of any other
// sport as "unchanged" so flipping sports doesn't lose typed text).
const SPORT_CONFIG = {
  softball: {
    label: 'Softball',
    champLogoSplit: ASSET_DIR + '26 SB Gameday Post - Champ Logo and Split.png',
    defaultHeadline: 'SOFTBALL CHAMPIONSHIP FIRST ROUND',
  },
  baseball: {
    label: 'Baseball',
    champLogoSplit: ASSET_DIR + '26 SB Gameday Post - Baseball Champ Logo and Split.png',
    defaultHeadline: 'BASEBALL CHAMPIONSHIP FIRST ROUND',
  },
};

// Network logos. Each has a sourceBox = the bbox of opaque content within
// the file, used to crop padding when scaling to a target height.
const NETWORKS = {
  cbssn: { src: ASSET_DIR + 'CBSSN_white.png',                  sourceBox: { x: 209, y:  493, w: 1502, h:  98 } },
  // ESPN+ wordmark (the "+" mark, not plain ESPN). Source PNG is a full
  // 1080×1350 canvas with the logo pre-placed at its target spot; we
  // source-crop just the wordmark bbox so the existing row-layout math
  // can scale + position it like any other network logo.
  espn:  { src: ASSET_DIR + '26 SB Gameday Post - ESPN+.png',   sourceBox: { x: 644, y: 1292, w:  165, h:  32 } },
};

// Geometry — measured from the reference PNGs. Photos extend all the way
// down to where the bottom navy band starts (y=1280) so the school logos
// and seed-box overlays sit on top of the photos rather than the photos
// cropping short above them.
const PHOTO     = { y: 420, h: 860, leftX: 0, midX: 540, rightX: 540, fullW: 540 };
const SCHOOL_LOGO = { w: 425, h: 221, leftX: 0, rightX: 655, y: 1075 };
const HEADLINE_CY = 411;        // red banner center y (Red Bar bbox y=382..441 → mid 411)
const HEADLINE_FS = 31.07;
const SEED_FONT_SIZE = 50;
const TIME_FONT_SIZE = 47.03;
const SEED_LEFT_CENTER  = { x: 35,   y: 1083 };
const SEED_RIGHT_CENTER = { x: 1047, y: 1083 };
const TIME_ROW_CY = 1320;       // bottom navy band center y
// Champ medallion in the source asset is at y=1049..1271; school logos sit
// at y=1075..1295. Shift the Champ-Logo-and-Split layer down by this many
// px so the medallion's top + bottom align with the school logos.
const CHAMP_LAYER_DY_BASE = 26;
const NAVY = '#082338';
const WHITE = '#FFFFFF';

// ─── State ────────────────────────────────────────────────────────────────
const state = {
  sport: 'softball',
  top:  { school: 'Liberty',    seed: '1', photo: null, logoImg: null },
  bot:  { school: 'Western Kentucky', seed: '2', photo: null, logoImg: null },
  headline: 'SOFTBALL CHAMPIONSHIP FIRST ROUND',
  timeText: '11:00 AM CT',
  network:  'cbssn',
  layerImgs: {},
  networkImgs: {},
  adj: {
    leftPhoto:  { dx: 0, dy: 0 },
    rightPhoto: { dx: 0, dy: 0 },
    leftLogo:   { dx: 0, dy: 0 },
    rightLogo:  { dx: 0, dy: 0 },
    leftSeedDy: 0,
    rightSeedDy: 0,
    timeRowDx: 0,
    timeRowDy: 0,
    headlineDx: 0,
    headlineDy: 0,
    champLayerDy: 0,  // additional fine-tune on top of CHAMP_LAYER_DY_BASE
  },
};

const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const topStatus = document.getElementById('topStatus');
function setStatus(msg, isErr){
  topStatus.textContent = msg || '';
  topStatus.classList.toggle('error', !!isErr);
}

// ─── Image loading ────────────────────────────────────────────────────────
const imgCache = new Map();
function loadImage(src){
  if (imgCache.has(src)) return imgCache.get(src);
  const p = new Promise((resolve, reject) => {
    const img = new Image();
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error('Image load failed: ' + src));
    img.src = src;
  });
  imgCache.set(src, p);
  return p;
}
async function ensureLayer(key){
  if (state.layerImgs[key]) return state.layerImgs[key];
  state.layerImgs[key] = await loadImage(encodeURI(LAYERS[key]));
  return state.layerImgs[key];
}
// Sport-aware Champ Logo + Split lookup. Cached per-sport so swapping is
// instant after the first load.
async function ensureChampLogoSplit(){
  const cfg = SPORT_CONFIG[state.sport];
  const cacheKey = '_champLogoSplit_' + state.sport;
  if (state.layerImgs[cacheKey]) return state.layerImgs[cacheKey];
  state.layerImgs[cacheKey] = await loadImage(encodeURI(cfg.champLogoSplit));
  return state.layerImgs[cacheKey];
}
async function ensureNetwork(key){
  if (state.networkImgs[key]) return state.networkImgs[key];
  if (!NETWORKS[key]) return null;
  state.networkImgs[key] = await loadImage(encodeURI(NETWORKS[key].src));
  return state.networkImgs[key];
}
async function ensureSchoolLogo(side){
  const sObj = state[side];
  const conf = SCHOOLS.find(s => s.id === sObj.school);
  if (!conf) { sObj.logoImg = null; return null; }
  try { sObj.logoImg = await loadImage(encodeURI(ASSET_DIR + conf.file)); }
  catch (e) { sObj.logoImg = null; setStatus('Could not load logo for ' + sObj.school, true); }
  return sObj.logoImg;
}

// ─── Photo upload ─────────────────────────────────────────────────────────
function onPhotoUpload(e){
  const file = e.target.files[0];
  if (!file) return;
  const which = e.target.dataset.photo;  // 'top' or 'bot'
  const fr = new FileReader();
  fr.onload = ev => {
    const img = new Image();
    img.onload = () => {
      state[which].photo = img;
      const zone = document.getElementById((which === 'top' ? 'topPhotoZone' : 'botPhotoZone'));
      const txt  = document.getElementById((which === 'top' ? 'topPhotoText' : 'botPhotoText'));
      zone.classList.add('loaded');
      txt.textContent = '✓ Photo loaded — click to replace';
      persistState();
      draw();
    };
    img.src = ev.target.result;
  };
  fr.readAsDataURL(file);
}

// ─── Render helpers ────────────────────────────────────────────────────────
function drawCoverFit(img, x, y, w, h, dx, dy){
  const ar = img.naturalWidth / img.naturalHeight;
  const tar = w / h;
  let sx, sy, sw, sh;
  if (ar > tar) {
    sh = h; sw = h * ar;
    sx = x - (sw - w) / 2;
    sy = y;
  } else {
    sw = w; sh = w / ar;
    sx = x;
    sy = y - (sh - h) / 2;
  }
  ctx.save();
  ctx.beginPath();
  ctx.rect(x, y, w, h);
  ctx.clip();
  ctx.drawImage(img, sx + (dx || 0), sy + (dy || 0), sw, sh);
  ctx.restore();
}

async function drawNetworkRow(){
  const time = (state.timeText || '').trim();
  const text = time ? (time + ' ON') : 'ON';
  ctx.font = `900 ${TIME_FONT_SIZE}px "Proxima Nova","Barlow Condensed",sans-serif`;
  const textW = ctx.measureText(text).width;
  const GAP = 24;

  let logoW = 0, logoH = 0, networkImg = null, sourceBox = null;
  if (state.network && NETWORKS[state.network]) {
    networkImg = await ensureNetwork(state.network);
    sourceBox  = NETWORKS[state.network].sourceBox;
    // Initial target height = ~80% of font height. Auto-shrink if total
    // would overflow the canvas's safe horizontal area.
    let targetH = Math.round(TIME_FONT_SIZE * 0.8);
    logoW = sourceBox.w * (targetH / sourceBox.h);
    logoH = targetH;
    const SAFE_W = 1080 - 60;
    if (textW + GAP + logoW > SAFE_W) {
      const allowed = SAFE_W - textW - GAP;
      logoW = Math.max(0, allowed);
      logoH = sourceBox.h * (logoW / sourceBox.w);
    }
  }

  const totalW = textW + (logoW > 0 ? GAP + logoW : 0);
  const startX = (1080 - totalW) / 2 + state.adj.timeRowDx;
  const cy     = TIME_ROW_CY + state.adj.timeRowDy;

  ctx.fillStyle = WHITE;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, startX, cy);
  if (networkImg && logoW > 0) {
    const logoX = startX + textW + GAP;
    const logoY = cy - logoH / 2;
    ctx.drawImage(networkImg, sourceBox.x, sourceBox.y, sourceBox.w, sourceBox.h, logoX, logoY, logoW, logoH);
  }
}

async function draw(){
  ctx.clearRect(0, 0, 1080, 1350);

  // 1. BG (has GAMEDAY text + empty red banner baked in)
  try { ctx.drawImage(await ensureLayer('bg'), 0, 0, 1080, 1350); }
  catch (e) { ctx.fillStyle = '#0a1628'; ctx.fillRect(0,0,1080,1350); console.error(e); }

  // 2. Split photos — left + right halves
  if (state.top.photo) {
    drawCoverFit(state.top.photo, PHOTO.leftX, PHOTO.y, PHOTO.fullW, PHOTO.h,
      state.adj.leftPhoto.dx, state.adj.leftPhoto.dy);
  } else {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(PHOTO.leftX, PHOTO.y, PHOTO.fullW, PHOTO.h);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '800 22px "Barlow Condensed",sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('UPLOAD LEFT PHOTO', PHOTO.leftX + PHOTO.fullW/2, PHOTO.y + PHOTO.h/2);
  }
  if (state.bot.photo) {
    drawCoverFit(state.bot.photo, PHOTO.rightX, PHOTO.y, PHOTO.fullW, PHOTO.h,
      state.adj.rightPhoto.dx, state.adj.rightPhoto.dy);
  } else {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(PHOTO.rightX, PHOTO.y, PHOTO.fullW, PHOTO.h);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '800 22px "Barlow Condensed",sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('UPLOAD RIGHT PHOTO', PHOTO.rightX + PHOTO.fullW/2, PHOTO.y + PHOTO.h/2);
  }

  // 3. Red Bar — sits ON TOP of the photos to bring the subtitle banner back
  //    in front (the BG's banner gets covered when the photo cover-fits past
  //    its top boundary). Bar y=382..441 in source coords.
  try { ctx.drawImage(await ensureLayer('redBar'), 0, 0, 1080, 1350); } catch (_) {}

  // 4. School logos (425×221 each)
  if (state.top.logoImg) {
    ctx.drawImage(state.top.logoImg,
      SCHOOL_LOGO.leftX + state.adj.leftLogo.dx,
      SCHOOL_LOGO.y + state.adj.leftLogo.dy,
      SCHOOL_LOGO.w, SCHOOL_LOGO.h);
  }
  if (state.bot.logoImg) {
    ctx.drawImage(state.bot.logoImg,
      SCHOOL_LOGO.rightX + state.adj.rightLogo.dx,
      SCHOOL_LOGO.y + state.adj.rightLogo.dy,
      SCHOOL_LOGO.w, SCHOOL_LOGO.h);
  }

  // 5. Champ Logo and Split (sport-specific medallion + divider).
  //    Shifted down so the medallion's top + bottom align with the school-logo row.
  try {
    const dy = CHAMP_LAYER_DY_BASE + state.adj.champLayerDy;
    ctx.drawImage(await ensureChampLogoSplit(), 0, dy, 1080, 1350);
  } catch (_) {}

  // 6. Seeding Overlay (small light-gray seed boxes at far edges)
  try { ctx.drawImage(await ensureLayer('seedingOverlay'), 0, 0, 1080, 1350); } catch (_) {}

  // ── Text overlays ──
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Headline (red banner) — Proxima Nova ExtraBold 31.07pt white
  ctx.fillStyle = WHITE;
  ctx.font = `800 ${HEADLINE_FS}px "Proxima Nova","Barlow Condensed",sans-serif`;
  ctx.fillText((state.headline || '').toUpperCase(), 540 + state.adj.headlineDx, HEADLINE_CY + state.adj.headlineDy);

  // Seeds — Proxima Nova ExtraBold 50pt navy (in seed boxes)
  ctx.fillStyle = NAVY;
  ctx.font = `800 ${SEED_FONT_SIZE}px "Proxima Nova","Barlow Condensed",sans-serif`;
  ctx.fillText(state.top.seed || '', SEED_LEFT_CENTER.x,  SEED_LEFT_CENTER.y  + state.adj.leftSeedDy);
  ctx.fillText(state.bot.seed || '', SEED_RIGHT_CENTER.x, SEED_RIGHT_CENTER.y + state.adj.rightSeedDy);

  // Time + network row
  await drawNetworkRow();
}

// ─── Wire-up ──────────────────────────────────────────────────────────────
function populateSchools(){
  const opts = SCHOOLS.map(s => `<option value="${s.id}">${s.id}</option>`).join('');
  document.getElementById('topSchool').innerHTML = opts;
  document.getElementById('botSchool').innerHTML = opts;
  document.getElementById('topSchool').value = state.top.school;
  document.getElementById('botSchool').value = state.bot.school;
}

document.getElementById('topSchool').addEventListener('change', async e => { state.top.school = e.target.value; await ensureSchoolLogo('top'); persistState(); draw(); });
document.getElementById('botSchool').addEventListener('change', async e => { state.bot.school = e.target.value; await ensureSchoolLogo('bot'); persistState(); draw(); });
document.getElementById('topSeed').addEventListener('input', e => { state.top.seed = e.target.value; persistState(); draw(); });
document.getElementById('botSeed').addEventListener('input', e => { state.bot.seed = e.target.value; persistState(); draw(); });
document.getElementById('sportSel').addEventListener('change', async e => {
  const newSport = e.target.value;
  if (!SPORT_CONFIG[newSport]) return;
  const isDefaultForAnySport = Object.values(SPORT_CONFIG).some(c => c.defaultHeadline === state.headline);
  state.sport = newSport;
  if (isDefaultForAnySport) {
    state.headline = SPORT_CONFIG[newSport].defaultHeadline;
    document.getElementById('headline').value = state.headline;
  }
  await ensureChampLogoSplit().catch(()=>null);
  persistState();
  draw();
});
document.getElementById('headline').addEventListener('input', e => { state.headline = e.target.value; persistState(); draw(); });
document.getElementById('timeText').addEventListener('input', e => { state.timeText = e.target.value; persistState(); draw(); });
document.getElementById('networkSel').addEventListener('change', async e => { state.network = e.target.value; if (state.network) await ensureNetwork(state.network); persistState(); draw(); });

// Auto-save: persist the FULL operator state — schools, seeds, sport,
// headline, time, network, uploaded photos (data URLs), and position
// adjustments. Reload restores the workflow exactly. v1 (positions only)
// is read once for migration, then v2 takes over.
const POS_STORAGE_KEY = 'cusa_championship_softball_gameday_positions_v1';
const STATE_KEY       = 'cusa_championship_softball_gameday_v2';

function persistState(){
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify({
      top: { school: state.top.school, seed: state.top.seed, photo: state.top.photo ? state.top.photo.src : null },
      bot: { school: state.bot.school, seed: state.bot.seed, photo: state.bot.photo ? state.bot.photo.src : null },
      sport:    state.sport,
      headline: state.headline,
      timeText: state.timeText,
      network:  state.network,
      adj:      state.adj,
    }));
  } catch (_) {}
}
// Hook persistState to also save to Supabase (must run before persistPositions
// alias is captured so the alias points at the wrapped version).
if (window.cusaPage) window.cusaPage.hookPersist({ pageKey: 'championship-game-day', stateKey: STATE_KEY });
const persistPositions = persistState;

function restoreState(){
  // Try v2 full state first; fall back to v1 positions-only.
  let v2 = null;
  try { const raw = localStorage.getItem(STATE_KEY); if (raw) v2 = JSON.parse(raw); } catch (_) {}
  if (v2 && typeof v2 === 'object') {
    if (v2.top && typeof v2.top === 'object') {
      if (v2.top.school) state.top.school = v2.top.school;
      if (typeof v2.top.seed === 'string') state.top.seed = v2.top.seed;
    }
    if (v2.bot && typeof v2.bot === 'object') {
      if (v2.bot.school) state.bot.school = v2.bot.school;
      if (typeof v2.bot.seed === 'string') state.bot.seed = v2.bot.seed;
    }
    if (typeof v2.sport === 'string')    state.sport    = v2.sport;
    if (typeof v2.headline === 'string') state.headline = v2.headline;
    if (typeof v2.timeText === 'string') state.timeText = v2.timeText;
    if (typeof v2.network === 'string')  state.network  = v2.network;
    if (v2.adj && typeof v2.adj === 'object') {
      ['leftPhoto','rightPhoto','leftLogo','rightLogo'].forEach(k => {
        if (v2.adj[k] && typeof v2.adj[k] === 'object') Object.assign(state.adj[k], v2.adj[k]);
      });
      ['leftSeedDy','rightSeedDy','timeRowDx','timeRowDy','headlineDx','headlineDy','champLayerDy'].forEach(k => {
        if (typeof v2.adj[k] === 'number') state.adj[k] = v2.adj[k];
      });
    }
    // Photos restored async — UI markers update in onload.
    ['top','bot'].forEach(which => {
      const dataUrl = v2[which] && v2[which].photo;
      if (typeof dataUrl !== 'string' || !dataUrl) return;
      const img = new Image();
      img.onload = () => {
        state[which].photo = img;
        const zone = document.getElementById(which === 'top' ? 'topPhotoZone' : 'botPhotoZone');
        const txt  = document.getElementById(which === 'top' ? 'topPhotoText' : 'botPhotoText');
        if (zone) zone.classList.add('loaded');
        if (txt) txt.textContent = '✓ Photo loaded — click to replace';
        draw();
      };
      img.src = dataUrl;
    });
    return;
  }
  // v1 fallback (positions only).
  try {
    const raw = localStorage.getItem(POS_STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (!saved || typeof saved !== 'object') return;
    ['leftPhoto','rightPhoto','leftLogo','rightLogo'].forEach(k => {
      if (saved[k] && typeof saved[k] === 'object') Object.assign(state.adj[k], saved[k]);
    });
    ['leftSeedDy','rightSeedDy','timeRowDx','timeRowDy','headlineDx','headlineDy','champLayerDy'].forEach(k => {
      if (typeof saved[k] === 'number') state.adj[k] = saved[k];
    });
  } catch (_) {}
}
const restorePositions = restoreState;

const ADJ_BINDINGS = [
  ['leftPhotoDx',  v => state.adj.leftPhoto.dx  = v],
  ['leftPhotoDy',  v => state.adj.leftPhoto.dy  = v],
  ['rightPhotoDx', v => state.adj.rightPhoto.dx = v],
  ['rightPhotoDy', v => state.adj.rightPhoto.dy = v],
  ['leftLogoDx',   v => state.adj.leftLogo.dx   = v],
  ['leftLogoDy',   v => state.adj.leftLogo.dy   = v],
  ['rightLogoDx',  v => state.adj.rightLogo.dx  = v],
  ['rightLogoDy',  v => state.adj.rightLogo.dy  = v],
  ['leftSeedDy',   v => state.adj.leftSeedDy    = v],
  ['rightSeedDy',  v => state.adj.rightSeedDy   = v],
  ['timeRowDx',    v => state.adj.timeRowDx     = v],
  ['timeRowDy',    v => state.adj.timeRowDy     = v],
  ['headlineDx',   v => state.adj.headlineDx    = v],
  ['headlineDy',   v => state.adj.headlineDy    = v],
  ['champLayerDy', v => state.adj.champLayerDy  = v],
];

function syncSlidersFromState(){
  const m = {
    leftPhotoDx:  state.adj.leftPhoto.dx,
    leftPhotoDy:  state.adj.leftPhoto.dy,
    rightPhotoDx: state.adj.rightPhoto.dx,
    rightPhotoDy: state.adj.rightPhoto.dy,
    leftLogoDx:   state.adj.leftLogo.dx,
    leftLogoDy:   state.adj.leftLogo.dy,
    rightLogoDx:  state.adj.rightLogo.dx,
    rightLogoDy:  state.adj.rightLogo.dy,
    leftSeedDy:   state.adj.leftSeedDy,
    rightSeedDy:  state.adj.rightSeedDy,
    timeRowDx:    state.adj.timeRowDx,
    timeRowDy:    state.adj.timeRowDy,
    headlineDx:   state.adj.headlineDx,
    headlineDy:   state.adj.headlineDy,
    champLayerDy: state.adj.champLayerDy,
  };
  for (const [id, val] of Object.entries(m)) {
    const inp = document.getElementById(id);
    const ro  = document.getElementById(id + 'R');
    if (inp) inp.value = String(val);
    if (ro) ro.textContent = (val >= 0 ? '+' : '') + val + 'px';
  }
}

ADJ_BINDINGS.forEach(([id, setter]) => {
  const inp = document.getElementById(id);
  const ro  = document.getElementById(id + 'R');
  inp.addEventListener('input', () => {
    const v = Number(inp.value || 0);
    setter(v);
    if (ro) ro.textContent = (v >= 0 ? '+' : '') + v + 'px';
    persistPositions();
    draw();
  });
});

document.getElementById('resetPositions').addEventListener('click', () => {
  state.adj = {
    leftPhoto: { dx: 0, dy: 0 }, rightPhoto: { dx: 0, dy: 0 },
    leftLogo:  { dx: 0, dy: 0 }, rightLogo:  { dx: 0, dy: 0 },
    leftSeedDy: 0, rightSeedDy: 0, timeRowDx: 0, timeRowDy: 0, headlineDx: 0, headlineDy: 0, champLayerDy: 0,
  };
  syncSlidersFromState();
  persistPositions();
  draw();
});

document.getElementById('download').addEventListener('click', () => {
  const safe = (s) => (s||'').replace(/[^a-z0-9]+/gi,'_').replace(/^_|_$/g,'') || 'X';
  const fname = `CUSA_Softball_Game_Day_${safe(state.top.school)}_vs_${safe(state.bot.school)}.png`;
  const a = document.createElement('a');
  a.href = cvs.toDataURL('image/png');
  a.download = fname;
  a.click();
});

// ─── Init ─────────────────────────────────────────────────────────────────
(async () => {
  restoreState();
  populateSchools();
  syncSlidersFromState();
  if (document.fonts && document.fonts.load) {
    try { await document.fonts.load(`800 ${HEADLINE_FS}px "Proxima Nova"`); } catch(_) {}
    try { await document.fonts.load(`800 ${SEED_FONT_SIZE}px "Proxima Nova"`); } catch(_) {}
    try { await document.fonts.load(`900 ${TIME_FONT_SIZE}px "Proxima Nova"`); } catch(_) {}
  }
  document.getElementById('sportSel').value   = state.sport;
  document.getElementById('headline').value   = state.headline;
  document.getElementById('topSeed').value    = state.top.seed;
  document.getElementById('botSeed').value    = state.bot.seed;
  const tt = document.getElementById('timeText'); if (tt) tt.value = state.timeText || '';
  const ns = document.getElementById('networkSel'); if (ns) ns.value = state.network || '';
  await Promise.all([
    ensureLayer('bg').catch(()=>null),
    ensureLayer('redBar').catch(()=>null),
    ensureChampLogoSplit().catch(()=>null),
    ensureLayer('seedingOverlay').catch(()=>null),
    ensureNetwork(state.network).catch(()=>null),
    ensureSchoolLogo('top'),
    ensureSchoolLogo('bot'),
  ]);
  draw();
  if (window.cusaPage) window.cusaPage.boot({ pageKey: 'championship-game-day', stateKey: STATE_KEY });
})();
</script>
