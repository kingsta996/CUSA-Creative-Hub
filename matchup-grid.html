<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CUSA Hub · Matchup Grid (16:9)</title>
<link rel="icon" type="image/png" href="assets/cusa-favicon.png">
<style>
@font-face{font-family:'Barlow';font-weight:400;src:local('Barlow'),local('-apple-system')}
@font-face{font-family:'Barlow Condensed';font-weight:400;src:local('Barlow Condensed'),local('-apple-system')}
@font-face{font-family:'Proxima Nova';font-weight:400;src:url('fonts/ProximaNovaRegular.woff') format('woff'),url('fonts/ProximaNovaRegular.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Proxima Nova';font-weight:700;src:url('fonts/ProximaNovaBold.woff') format('woff'),url('fonts/ProximaNovaBold.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Proxima Nova';font-weight:900;src:url('fonts/ProximaNovaBlack.woff') format('woff'),url('fonts/ProximaNovaBlack.ttf') format('truetype');font-display:swap}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Barlow',sans-serif;background:#060f1a;color:#fff}
/* Embedded mode (?embedded=1) — hide ONLY the page chrome (topbar). The
   panel + canvas stay so the operator can edit from inside the iframe. */
body.embedded .topbar{display:none !important}
body.embedded .main{height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;background:#0a1624;border-bottom:1px solid rgba(255,255,255,0.08)}
.topbar-left{display:flex;align-items:center;gap:18px}
.topbar-logo{height:30px;width:auto;display:block}
.topbar-sep{width:1px;height:22px;background:rgba(255,255,255,0.18)}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:2px;color:#fff}
.back{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.6);text-decoration:none;border:1px solid rgba(255,255,255,0.18);padding:7px 12px;border-radius:4px}

.main{display:flex;gap:14px;padding:14px;height:calc(100vh - 56px)}
.panel{flex:0 0 360px;background:#0a1624;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.panel-head{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:3px;color:rgba(235,25,70,0.85);text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid rgba(235,25,70,0.18)}
.field{display:flex;flex-direction:column;gap:4px}
.field-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.55);text-transform:uppercase}
.field input[type=text],.field input[type=number],.field select,.field input[type=color]{font-family:'Barlow',sans-serif;font-size:13px;background:#0a1624;color:#fff;border:1px solid rgba(255,255,255,0.18);border-radius:4px;padding:8px 10px;width:100%}
.row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row-5{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:6px}
.team-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:10px;display:flex;flex-direction:column;gap:8px}
.team-card-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:3px;color:rgba(235,25,70,0.85);text-transform:uppercase}
.btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;color:#fff;background:#EB1946;border:none;padding:11px 16px;border-radius:4px;cursor:pointer;text-transform:uppercase;width:100%}
.btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.25)}
.btn.secondary:hover{background:rgba(255,255,255,0.06)}
.count-btn{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;background:transparent;color:rgba(255,255,255,0.55);border:1px solid rgba(255,255,255,0.18);border-radius:4px;padding:10px 0;cursor:pointer}
.count-btn.active{background:#EB1946;color:#fff;border-color:#EB1946}
.count-btn:hover:not(.active){background:rgba(255,255,255,0.06);color:#fff}

.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:#000;border-radius:6px;overflow:hidden;position:relative}
.canvas-wrap{width:100%;max-width:1920px;aspect-ratio:16/9;background:var(--canvas-bg,#000);position:relative}
canvas#cvs{display:block;width:100%;height:100%}
.preview-meta{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.35);pointer-events:none}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js" onerror="console.warn('config.js not generated — run bash build.sh')"></script>
<script src="assets/cusa-auth.js"></script>
<script src="assets/cusa-cloud-state.js"></script>
<script src="assets/cusa-page.js"></script>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" aria-label="CUSA Creative Hub"><img class="topbar-logo" src="assets/cusa-primary-white.png" alt="Conference USA"></a>
    <div class="topbar-sep"></div>
    <div class="topbar-title">MATCHUP GRID · 16:9</div>
  </div>
  <div>
    <a class="back" href="index.html">← HUB</a>
  </div>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-head">Grid Settings</div>
    <div class="field">
      <label class="field-label">Aspect Ratio</label>
      <div class="row-2" id="orientButtons">
        <button class="count-btn active" data-orient="landscape">16:9 · 1920×1080</button>
        <button class="count-btn" data-orient="portrait">9:16 · 1080×1920</button>
      </div>
    </div>
    <div class="field">
      <label class="field-label">How many matchups?</label>
      <div class="row-5" id="countButtons">
        <button class="count-btn" data-count="1">1</button>
        <button class="count-btn" data-count="2">2</button>
        <button class="count-btn" data-count="3">3</button>
        <button class="count-btn" data-count="4">4</button>
        <button class="count-btn active" data-count="5">5</button>
      </div>
    </div>
    <div class="field"><label class="field-label">Title</label><input id="titleText" type="text" maxlength="40" value="WHERE TO WATCH"></div>
    <div class="field"><label class="field-label">Subtitle / Date Range</label><input id="subtitleText" type="text" maxlength="40" value="WEEK 5 · SATURDAY"></div>

    <div class="field" style="margin-top:4px">
      <label class="field-label">Background</label>
      <div class="row-2" style="margin-bottom:6px">
        <button class="btn secondary" id="bgPatternBtn" style="font-size:10px;padding:6px 10px">Use CUSA pattern</button>
        <button class="btn secondary" id="clearBgBtn" style="font-size:10px;padding:6px 10px">Remove background</button>
      </div>
      <label class="upload-zone" id="bgZone" style="display:block;border:1px dashed rgba(255,255,255,0.18);border-radius:4px;padding:14px;text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,0.55);cursor:pointer">
        <input type="file" accept="image/*" id="bgUpload" style="display:none">
        <span id="bgZoneText">+ Upload background image</span>
      </label>
    </div>
    <div class="field"><label class="field-label">Background Color (when no image)</label><input id="bgColor" type="color" value="#0a254e" style="height:32px;padding:2px;background:#0a1624;border:1px solid rgba(255,255,255,0.18);border-radius:4px;width:100%"></div>

    <div class="panel-head" style="margin-top:8px">Group Transform</div>
    <div class="field"><label class="field-label">Scale <span class="nudge-readout" id="grpScaleVal">1.00×</span></label><input id="grpScale" type="range" min="0.5" max="1.5" step="0.01" value="1"></div>
    <div class="row-2">
      <div class="field"><label class="field-label">Nudge X <span class="nudge-readout" id="grpDxVal">0</span></label><input id="grpDx" type="range" min="-200" max="200" step="1" value="0"></div>
      <div class="field"><label class="field-label">Nudge Y <span class="nudge-readout" id="grpDyVal">0</span></label><input id="grpDy" type="range" min="-200" max="200" step="1" value="0"></div>
    </div>

    <button class="btn secondary" id="advToggle" style="margin-top:8px;font-size:10px;padding:8px 10px">▶ Advanced Adjustments (per-row, applied to all)</button>
    <div id="advPanel" style="display:none;flex-direction:column;gap:10px;margin-top:6px;padding:10px;border:1px solid rgba(255,255,255,0.08);border-radius:4px;background:rgba(0,0,0,0.18)">
      <!-- KO + Logo Scale -->
      <div class="panel-head" style="font-size:9px;letter-spacing:2px;border-bottom-color:rgba(255,255,255,0.12);color:rgba(255,255,255,0.55)">Knockouts &amp; Logos</div>
      <div class="row-2">
        <div class="field"><label class="field-label">KO Opacity <span class="nudge-readout" id="koOpacityVal">0.22</span></label><input id="koOpacity" type="range" min="0" max="1" step="0.01" value="0.22"></div>
        <div class="field"><label class="field-label">KO Scale <span class="nudge-readout" id="koScaleVal">1.30×</span></label><input id="koScale" type="range" min="0.6" max="2.5" step="0.01" value="1.3"></div>
      </div>
      <div class="row-3">
        <div class="field"><label class="field-label">L Logo Scale <span class="nudge-readout" id="leftLogoScaleVal">1.00×</span></label><input id="leftLogoScale" type="range" min="0.5" max="1.6" step="0.01" value="1"></div>
        <div class="field"><label class="field-label">L Logo dX <span class="nudge-readout" id="leftLogoDxVal">0</span></label><input id="leftLogoDx" type="range" min="-30" max="30" step="1" value="0"></div>
        <div class="field"><label class="field-label">L Logo dY <span class="nudge-readout" id="leftLogoDyVal">0</span></label><input id="leftLogoDy" type="range" min="-30" max="30" step="1" value="0"></div>
      </div>
      <div class="row-3">
        <div class="field"><label class="field-label">R Logo Scale <span class="nudge-readout" id="rightLogoScaleVal">1.00×</span></label><input id="rightLogoScale" type="range" min="0.5" max="1.6" step="0.01" value="1"></div>
        <div class="field"><label class="field-label">R Logo dX <span class="nudge-readout" id="rightLogoDxVal">0</span></label><input id="rightLogoDx" type="range" min="-30" max="30" step="1" value="0"></div>
        <div class="field"><label class="field-label">R Logo dY <span class="nudge-readout" id="rightLogoDyVal">0</span></label><input id="rightLogoDy" type="range" min="-30" max="30" step="1" value="0"></div>
      </div>

      <!-- Text nudges -->
      <div class="panel-head" style="font-size:9px;letter-spacing:2px;border-bottom-color:rgba(255,255,255,0.12);color:rgba(255,255,255,0.55);margin-top:4px">Text Position</div>
      <div class="row-2">
        <div class="field"><label class="field-label">L Name dX <span class="nudge-readout" id="leftNameDxVal">0</span></label><input id="leftNameDx" type="range" min="-30" max="30" step="1" value="0"></div>
        <div class="field"><label class="field-label">L Name dY <span class="nudge-readout" id="leftNameDyVal">0</span></label><input id="leftNameDy" type="range" min="-30" max="30" step="1" value="0"></div>
      </div>
      <div class="row-2">
        <div class="field"><label class="field-label">L Nick dX <span class="nudge-readout" id="leftNickDxVal">0</span></label><input id="leftNickDx" type="range" min="-30" max="30" step="1" value="0"></div>
        <div class="field"><label class="field-label">L Nick dY <span class="nudge-readout" id="leftNickDyVal">0</span></label><input id="leftNickDy" type="range" min="-30" max="30" step="1" value="0"></div>
      </div>
      <div class="row-2">
        <div class="field"><label class="field-label">R Name dX <span class="nudge-readout" id="rightNameDxVal">0</span></label><input id="rightNameDx" type="range" min="-30" max="30" step="1" value="0"></div>
        <div class="field"><label class="field-label">R Name dY <span class="nudge-readout" id="rightNameDyVal">0</span></label><input id="rightNameDy" type="range" min="-30" max="30" step="1" value="0"></div>
      </div>
      <div class="row-2">
        <div class="field"><label class="field-label">R Nick dX <span class="nudge-readout" id="rightNickDxVal">0</span></label><input id="rightNickDx" type="range" min="-30" max="30" step="1" value="0"></div>
        <div class="field"><label class="field-label">R Nick dY <span class="nudge-readout" id="rightNickDyVal">0</span></label><input id="rightNickDy" type="range" min="-30" max="30" step="1" value="0"></div>
      </div>

      <!-- Date / Time / Network strip -->
      <div class="panel-head" style="font-size:9px;letter-spacing:2px;border-bottom-color:rgba(255,255,255,0.12);color:rgba(255,255,255,0.55);margin-top:4px">Strip Text (Date / Time / Network)</div>
      <div class="row-2">
        <div class="field"><label class="field-label">Date dX <span class="nudge-readout" id="dateDxVal">0</span></label><input id="dateDx" type="range" min="-30" max="30" step="1" value="0"></div>
        <div class="field"><label class="field-label">Date dY <span class="nudge-readout" id="dateDyVal">0</span></label><input id="dateDy" type="range" min="-30" max="30" step="1" value="0"></div>
      </div>
      <div class="row-2">
        <div class="field"><label class="field-label">Time dX <span class="nudge-readout" id="timeDxVal">0</span></label><input id="timeDx" type="range" min="-30" max="30" step="1" value="0"></div>
        <div class="field"><label class="field-label">Time dY <span class="nudge-readout" id="timeDyVal">0</span></label><input id="timeDy" type="range" min="-30" max="30" step="1" value="0"></div>
      </div>
      <div class="row-2">
        <div class="field"><label class="field-label">Net dX <span class="nudge-readout" id="netDxVal">0</span></label><input id="netDx" type="range" min="-30" max="30" step="1" value="0"></div>
        <div class="field"><label class="field-label">Net dY <span class="nudge-readout" id="netDyVal">0</span></label><input id="netDy" type="range" min="-30" max="30" step="1" value="0"></div>
      </div>

      <!-- Drop shadows -->
      <div class="panel-head" style="font-size:9px;letter-spacing:2px;border-bottom-color:rgba(255,255,255,0.12);color:rgba(255,255,255,0.55);margin-top:4px">Logo Shadow</div>
      <div class="row-2">
        <label class="field-label" style="display:flex;align-items:center;gap:6px"><input id="logoShadowL" type="checkbox" checked> Left</label>
        <label class="field-label" style="display:flex;align-items:center;gap:6px"><input id="logoShadowR" type="checkbox" checked> Right</label>
      </div>
      <div class="row-2">
        <div class="field"><label class="field-label">Color</label><input id="logoShadowColor" type="color" value="#000000" style="height:30px"></div>
        <div class="field"><label class="field-label">Alpha <span class="nudge-readout" id="logoShadowAVal">0.50</span></label><input id="logoShadowA" type="range" min="0" max="1" step="0.01" value="0.5"></div>
      </div>
      <div class="row-3">
        <div class="field"><label class="field-label">dX <span class="nudge-readout" id="logoShadowDxVal">2</span></label><input id="logoShadowDx" type="range" min="-20" max="20" step="1" value="2"></div>
        <div class="field"><label class="field-label">dY <span class="nudge-readout" id="logoShadowDyVal">2</span></label><input id="logoShadowDy" type="range" min="-20" max="20" step="1" value="2"></div>
        <div class="field"><label class="field-label">Blur <span class="nudge-readout" id="logoShadowBVal">4</span></label><input id="logoShadowB" type="range" min="0" max="40" step="1" value="4"></div>
      </div>

      <div class="panel-head" style="font-size:9px;letter-spacing:2px;border-bottom-color:rgba(255,255,255,0.12);color:rgba(255,255,255,0.55);margin-top:4px">Strip Shadow (nameplate text)</div>
      <label class="field-label" style="display:flex;align-items:center;gap:6px"><input id="stripShadowOn" type="checkbox"> Enable custom shadow (off uses default 2/2/3 black 60%)</label>
      <div class="row-2">
        <div class="field"><label class="field-label">Color</label><input id="stripShadowColor" type="color" value="#000000" style="height:30px"></div>
        <div class="field"><label class="field-label">Alpha <span class="nudge-readout" id="stripShadowAVal">0.50</span></label><input id="stripShadowA" type="range" min="0" max="1" step="0.01" value="0.5"></div>
      </div>
      <div class="row-3">
        <div class="field"><label class="field-label">dX <span class="nudge-readout" id="stripShadowDxVal">0</span></label><input id="stripShadowDx" type="range" min="-20" max="20" step="1" value="0"></div>
        <div class="field"><label class="field-label">dY <span class="nudge-readout" id="stripShadowDyVal">2</span></label><input id="stripShadowDy" type="range" min="-20" max="20" step="1" value="2"></div>
        <div class="field"><label class="field-label">Blur <span class="nudge-readout" id="stripShadowBVal">4</span></label><input id="stripShadowB" type="range" min="0" max="40" step="1" value="4"></div>
      </div>

      <div class="panel-head" style="font-size:9px;letter-spacing:2px;border-bottom-color:rgba(255,255,255,0.12);color:rgba(255,255,255,0.55);margin-top:4px">KO Texture Shadow</div>
      <div class="row-2">
        <label class="field-label" style="display:flex;align-items:center;gap:6px"><input id="koShadowL" type="checkbox"> Left</label>
        <label class="field-label" style="display:flex;align-items:center;gap:6px"><input id="koShadowR" type="checkbox"> Right</label>
      </div>
      <div class="row-2">
        <div class="field"><label class="field-label">Color</label><input id="koShadowColor" type="color" value="#000000" style="height:30px"></div>
        <div class="field"><label class="field-label">Alpha <span class="nudge-readout" id="koShadowAVal">0.50</span></label><input id="koShadowA" type="range" min="0" max="1" step="0.01" value="0.5"></div>
      </div>
      <div class="row-3">
        <div class="field"><label class="field-label">dX <span class="nudge-readout" id="koShadowDxVal">0</span></label><input id="koShadowDx" type="range" min="-20" max="20" step="1" value="0"></div>
        <div class="field"><label class="field-label">dY <span class="nudge-readout" id="koShadowDyVal">2</span></label><input id="koShadowDy" type="range" min="-20" max="20" step="1" value="2"></div>
        <div class="field"><label class="field-label">Blur <span class="nudge-readout" id="koShadowBVal">6</span></label><input id="koShadowB" type="range" min="0" max="40" step="1" value="6"></div>
      </div>

      <!-- Blend modes + square colors -->
      <div class="panel-head" style="font-size:9px;letter-spacing:2px;border-bottom-color:rgba(255,255,255,0.12);color:rgba(255,255,255,0.55);margin-top:4px">Blending &amp; Square Color</div>
      <div class="row-2">
        <div class="field"><label class="field-label">L Square Blend</label><select id="leftSqBlend"></select></div>
        <div class="field"><label class="field-label">R Square Blend</label><select id="rightSqBlend"></select></div>
      </div>
      <div class="row-2">
        <div class="field"><label class="field-label">L Square Color (empty = secondary)</label><input id="leftSqColor" type="color" value="#000000" style="height:30px"></div>
        <div class="field"><label class="field-label">R Square Color (empty = secondary)</label><input id="rightSqColor" type="color" value="#000000" style="height:30px"></div>
      </div>
      <div class="row-2">
        <button class="btn secondary" id="leftSqColorClear" style="font-size:10px;padding:6px 10px">L Use secondary</button>
        <button class="btn secondary" id="rightSqColorClear" style="font-size:10px;padding:6px 10px">R Use secondary</button>
      </div>

      <button class="btn secondary" id="resetAdjBtn" style="margin-top:6px;font-size:10px;padding:8px 10px">Reset all adjustments to defaults</button>
    </div>

    <div class="panel-head" style="margin-top:8px">Matchups</div>
    <div id="rowCards"></div>

    <button id="downloadBtn" class="btn">⬇ Download PNG</button>
  </div>

  <div class="canvas-area">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="cvs" width="1920" height="1080"></canvas>
      <div class="preview-meta">1920 × 1080 · Matchup Grid</div>
    </div>
  </div>
</div>

<script>
// ─── Constants ────────────────────────────────────────────────────────────
// Canvas dimensions are mutable so the operator can switch between 16:9
// (landscape) and 9:16 (portrait). Other geometry follows the row-base
// aspect (8:1 from the underlying matchup template).
let CANVAS_W = 1920;
let CANVAS_H = 1080;
const ROW_BASE_W = 1080;
const ROW_BASE_H = 135;
const TITLE_BAND_H = 110;
const ROW_GAP = 18;
const SIDE_MARGIN = 30;

const ASSET_DIR_TEMPLATE = 'matchup/template/';
const ASSET_DIR_PRIMARY  = 'matchup/primary/';
const ASSET_DIR_KO       = 'matchup/knockouts/';
const LAYER_OVERLAY = ASSET_DIR_TEMPLATE + '25 FB Week 1 Where to Watch (Saturday Slate) - Gradient Overlay - Small Logo Placeholders - At, Date, Network Placeholder.png';

// ─── Schools ──────────────────────────────────────────────────────────────
let SCHOOLS = [
  { name: 'Liberty',          tricode: 'LIB',  mascot: 'Flames',        primary: 'LIBERTY.PNG',          ko: 'LIBERTY.PNG',          swatch: '#0A254E' },
  { name: 'Middle Tennessee', tricode: 'MTSU', mascot: 'Blue Raiders',  primary: 'MIDDLE_TENNESSEE.PNG', ko: 'MIDDLE_TENNESSEE.PNG', swatch: '#036EB7' },
];
const CUSA_PRIORITY_NAMES = new Set([
  'Liberty','Middle Tennessee','Delaware','FIU','Florida International',
  'Jacksonville State','Kennesaw State','Louisiana Tech','Missouri State',
  'New Mexico State','Sam Houston','UTEP','Western Kentucky','Dallas Baptist',
]);

async function loadSchoolsJson(){
  try {
    const r = await fetch('matchup/schools.json', { cache: 'force-cache' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    if (Array.isArray(data) && data.length) SCHOOLS = data;
  } catch (e) {
    console.warn('schools.json fetch failed:', e);
  }
}
function schoolColor(s){
  if (!s) return '#666666';
  const sw = (s.swatch || '').trim();
  if (sw && sw !== 'N/A' && sw !== 'None' && /^#?[0-9a-f]+/i.test(sw)) return sw[0] === '#' ? sw : '#' + sw;
  return '#666666';
}
function schoolSecondaryColor(s){
  if (!s) return schoolColor(s);
  const sec = (s.secondary || '').trim();
  if (sec && /^#?[0-9a-f]+/i.test(sec)) return sec[0] === '#' ? sec : '#' + sec;
  return schoolColor(s);
}
function schoolNickname(s){
  if (!s) return '';
  if (s.mascot) return s.mascot.toUpperCase();
  const parts = (s.name || '').split(/\s+/);
  return (parts[parts.length - 1] || '').toUpperCase();
}
function hexToRgba(hex, a){
  const m = /^#([0-9a-f]{6})$/i.exec(hex || '#000000');
  if (!m) return `rgba(0,0,0,${a})`;
  const n = parseInt(m[1], 16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}

const state = {
  orientation: 'landscape',  // 'landscape' (16:9) | 'portrait' (9:16)
  count: 5,
  title:    'WHERE TO WATCH',
  subtitle: 'WEEK 5 · SATURDAY',
  rows: Array.from({ length: 5 }, () => DEFAULT_ROW()),
  previewBg: '#0a254e',
  bgImage:    null,    // Image object (in-memory)
  bgImageData: null,   // data URL persisted to localStorage
  bgPreset:   null,    // 'pattern' | null — when set, draw() uses the canned CUSA pattern instead of bgImage/previewBg
  adj:        DEFAULT_ADJ(),
};
function persistState(){
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify({
      orientation: state.orientation,
      count: state.count,
      title: state.title,
      subtitle: state.subtitle,
      rows: state.rows.map(r => ({ left: { school: r.left.school }, right: { school: r.right.school }, date: r.date, time: r.time, network: r.network })),
      previewBg: state.previewBg,
      bgImageData: state.bgImageData,
      bgPreset: state.bgPreset,
      adj: state.adj,
    }));
  } catch (_) {}
}
if (window.cusaPage) window.cusaPage.hookPersist({ pageKey: 'matchup-grid', stateKey: STATE_KEY });

function restoreState(){
  try {
    const raw = localStorage.getItem(STATE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.orientation === 'portrait' || s.orientation === 'landscape') state.orientation = s.orientation;
    if (typeof s.count === 'number' && s.count >= 1 && s.count <= 5) state.count = s.count;
    if (typeof s.title === 'string') state.title = s.title;
    if (typeof s.subtitle === 'string') state.subtitle = s.subtitle;
    if (Array.isArray(s.rows)) {
      for (let i = 0; i < Math.min(5, s.rows.length); i++) {
        const r = s.rows[i] || {};
        if (r.left?.school)  state.rows[i].left.school = r.left.school;
        if (r.right?.school) state.rows[i].right.school = r.right.school;
        if (typeof r.date === 'string') state.rows[i].date = r.date;
        if (typeof r.time === 'string') state.rows[i].time = r.time;
        if (typeof r.network === 'string') state.rows[i].network = r.network;
      }
    }
    if (typeof s.previewBg === 'string') state.previewBg = s.previewBg;
    if (typeof s.bgImageData === 'string' && s.bgImageData) {
      state.bgImageData = s.bgImageData;
      const img = new Image();
      img.onload = () => { state.bgImage = img; draw(); };
      img.src = s.bgImageData;
    }
    if (s.bgPreset === 'pattern') state.bgPreset = 'pattern';
    // Merge persisted adj over the defaults so removed/new fields stay sane.
    if (s.adj && typeof s.adj === 'object') {
      ['leftLogo','rightLogo','leftName','rightName','leftNick','rightNick',
       'leftKo','rightKo','dateNudge','timeNudge','networkNudge',
       'leftSquare','rightSquare','logoShadow','stripShadow','koShadow'
      ].forEach(k => { if (s.adj[k] && typeof s.adj[k] === 'object') Object.assign(state.adj[k], s.adj[k]); });
      ['groupScale','groupDx','groupDy','koOpacity','koScale'].forEach(k => {
        if (typeof s.adj[k] === 'number') state.adj[k] = s.adj[k];
      });
      if (typeof s.adj.textureBlend === 'string') state.adj.textureBlend = s.adj.textureBlend;
    }
  } catch (_) {}
}

// Image cache so each school's primary + KO loads once and is reused per row.
const IMG_CACHE = {};
function loadImage(src){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}
async function getImage(path){
  if (IMG_CACHE[path]) return IMG_CACHE[path];
  const p = loadImage(encodeURI(path));
  IMG_CACHE[path] = p;
  try { return await p; } catch (_) { delete IMG_CACHE[path]; throw _; }
}
let OVERLAY_IMG = null;
async function ensureOverlay(){
  if (OVERLAY_IMG) return OVERLAY_IMG;
  try { OVERLAY_IMG = await getImage(LAYER_OVERLAY); } catch (_) {}
  return OVERLAY_IMG;
}

// ─── Row drawing (copy of matchup.html geometry, simplified — defaults) ───
const LOGO_BOX = { w: 100, h: 100, leftX: 14, rightX: ROW_BASE_W - 14 - 100, y: 10 };
const BAR     = { x: 60, y: 10, w: ROW_BASE_W - 120, h: 95, mid: 540 };
const NAME_FS = 14;
const NICK_FS = 52;
const NAME_CY = 38;
const NICK_CY = 78;
const LEFT_TEXT_X  = 512;
const RIGHT_TEXT_X = 571;

function drawContainFit(rctx, img, x, y, w, h){
  const ar = img.naturalWidth / img.naturalHeight;
  const tar = w / h;
  let dw, dh;
  if (ar > tar) { dw = w; dh = w / ar; } else { dh = h; dw = h * ar; }
  rctx.drawImage(img, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
}

function drawKoTexture(rctx, img, x, y, w, h, alpha, scale, side, nudge, shadow){
  rctx.save();
  rctx.beginPath();
  rctx.rect(x, y, w, h);
  rctx.clip();
  const targetH = h * scale;
  const ar = img.naturalWidth / img.naturalHeight;
  const targetW = targetH * ar;
  const ox = (side === 'left' ? x + (w - targetW) * 0.25 : x + (w - targetW) * 0.75) + (nudge?.dx || 0);
  const oy = y + (h - targetH) / 2 + (nudge?.dy || 0);
  if (shadow && shadow.on) {
    rctx.shadowColor   = hexToRgba(shadow.color || '#000000', shadow.alpha != null ? shadow.alpha : 0.5);
    rctx.shadowBlur    = shadow.blur || 0;
    rctx.shadowOffsetX = shadow.dx   || 0;
    rctx.shadowOffsetY = shadow.dy   || 0;
  }
  rctx.globalAlpha = alpha;
  rctx.globalCompositeOperation = 'screen';
  rctx.drawImage(img, ox, oy, targetW, targetH);
  rctx.restore();
}

function drawSideText(rctx, conf, anchorX, align, nameNudge, nickNudge, stripShadow){
  rctx.fillStyle = '#FFFFFF';
  rctx.textAlign = align;
  rctx.textBaseline = 'middle';
  // Strip shadow on nameplate text — operator-tunable. Default keeps the
  // existing 2/2/3 black-60% drop so legacy renders look the same.
  if (stripShadow && stripShadow.on) {
    rctx.shadowColor   = hexToRgba(stripShadow.color || '#000000', stripShadow.alpha != null ? stripShadow.alpha : 0.5);
    rctx.shadowBlur    = stripShadow.blur || 0;
    rctx.shadowOffsetX = stripShadow.dx   || 0;
    rctx.shadowOffsetY = stripShadow.dy   || 0;
  } else {
    rctx.shadowColor   = 'rgba(0,0,0,0.6)';
    rctx.shadowBlur    = 3;
    rctx.shadowOffsetX = 2;
    rctx.shadowOffsetY = 2;
  }
  rctx.font = `700 ${NAME_FS}px "Proxima Nova","Barlow Condensed",sans-serif`;
  rctx.fillText((conf.name || '').toUpperCase(), anchorX + (nameNudge?.dx || 0), NAME_CY + (nameNudge?.dy || 0));
  rctx.font = `700 ${NICK_FS}px "Proxima Nova","Barlow Condensed",sans-serif`;
  rctx.fillText(schoolNickname(conf), anchorX + (nickNudge?.dx || 0), NICK_CY + (nickNudge?.dy || 0));
  rctx.shadowColor = 'rgba(0,0,0,0)';
  rctx.shadowBlur = rctx.shadowOffsetX = rctx.shadowOffsetY = 0;
}

// Draw a colored square backdrop in the LOGO_BOX area — same as matchup.html
// (default: school SECONDARY color, overlay blend so the box keeps the
// gradient-overlay's depth on top).
function drawLogoSquare(rctx, boxX, boxY, color, blend){
  const w = 76, h = 67;
  const cx = boxX + LOGO_BOX.w / 2;
  const cy = boxY + LOGO_BOX.h / 2;
  rctx.save();
  rctx.fillStyle = color || '#FFFFFF';
  rctx.globalCompositeOperation = blend || 'overlay';
  rctx.fillRect(cx - w/2, cy - h/2, w, h);
  rctx.restore();
}

// drawLogoWithShadow — primary logo at corner box, honoring per-side
// shadow toggle/color/dx/dy/blur/alpha + per-side scale/dx/dy nudges.
function drawLogoWithShadow(rctx, img, boxX, boxY, nudge, shadow, sideOn){
  const dx = (nudge?.dx) || 0;
  const dy = (nudge?.dy) || 0;
  const scale = (nudge?.scale) || 1;
  const w = LOGO_BOX.w * scale;
  const h = LOGO_BOX.h * scale;
  const x = boxX + dx + (LOGO_BOX.w - w) / 2;
  const y = boxY + dy + (LOGO_BOX.h - h) / 2;
  rctx.save();
  if (sideOn && shadow) {
    rctx.shadowColor   = hexToRgba(shadow.color || '#000000', shadow.alpha != null ? shadow.alpha : 0.5);
    rctx.shadowBlur    = shadow.blur || 0;
    rctx.shadowOffsetX = shadow.dx   || 0;
    rctx.shadowOffsetY = shadow.dy   || 0;
  }
  drawContainFit(rctx, img, x, y, w, h);
  rctx.restore();
}

async function drawRow(rctx, rowState){
  rctx.clearRect(0, 0, ROW_BASE_W, ROW_BASE_H);
  const leftConf  = SCHOOLS.find(s => s.name === rowState.left.school);
  const rightConf = SCHOOLS.find(s => s.name === rowState.right.school);
  const adj = state.adj;

  // Color blocks (team primary across each half of the bar).
  if (leftConf)  { rctx.fillStyle = schoolColor(leftConf);  rctx.fillRect(BAR.x,  BAR.y, BAR.mid - BAR.x, BAR.h); }
  if (rightConf) { rctx.fillStyle = schoolColor(rightConf); rctx.fillRect(BAR.mid, BAR.y, BAR.x + BAR.w - BAR.mid, BAR.h); }

  // Knockout textures per side. Honor adj.koOpacity / koScale / textureBlend
  // (the blend mode is applied on top of the screen blend by saving + setting
  // globalCompositeOperation in the helper). koShadow.leftOn/rightOn gate
  // per-side shadow.
  const leftKoImg  = leftConf  && leftConf.ko  ? await getImage(ASSET_DIR_KO + leftConf.ko).catch(()=>null)  : null;
  const rightKoImg = rightConf && rightConf.ko ? await getImage(ASSET_DIR_KO + rightConf.ko).catch(()=>null) : null;
  if (leftKoImg) {
    const sideShadow = adj.koShadow.leftOn ? adj.koShadow : null;
    drawKoTexture(rctx, leftKoImg,  BAR.x,  BAR.y, BAR.mid - BAR.x, BAR.h, adj.koOpacity, adj.koScale, 'left',  adj.leftKo,  sideShadow ? { ...adj.koShadow, on: true } : null);
  }
  if (rightKoImg) {
    const sideShadow = adj.koShadow.rightOn ? adj.koShadow : null;
    drawKoTexture(rctx, rightKoImg, BAR.mid, BAR.y, BAR.x + BAR.w - BAR.mid, BAR.h, adj.koOpacity, adj.koScale, 'right', adj.rightKo, sideShadow ? { ...adj.koShadow, on: true } : null);
  }

  // Gradient overlay (logo box edges + AT badge + date/time/network pill).
  const overlay = await ensureOverlay();
  if (overlay) rctx.drawImage(overlay, 0, 0, ROW_BASE_W, ROW_BASE_H);

  // Logo-square backdrops — secondary color by default; adj.leftSquare.color
  // / rightSquare.color override per side; blend mode tunable.
  const leftSqColor  = (adj.leftSquare.color  || '').trim() || schoolSecondaryColor(leftConf);
  const rightSqColor = (adj.rightSquare.color || '').trim() || schoolSecondaryColor(rightConf);
  drawLogoSquare(rctx, LOGO_BOX.leftX,  LOGO_BOX.y, leftSqColor,  adj.leftSquare.blend);
  drawLogoSquare(rctx, LOGO_BOX.rightX, LOGO_BOX.y, rightSqColor, adj.rightSquare.blend);

  // School primary logos in the corner boxes — drop shadow controls per-side.
  if (leftConf && leftConf.primary) {
    const img = await getImage(ASSET_DIR_PRIMARY + leftConf.primary).catch(()=>null);
    if (img) drawLogoWithShadow(rctx, img, LOGO_BOX.leftX,  LOGO_BOX.y, adj.leftLogo,  adj.logoShadow, adj.logoShadow.leftOn);
  }
  if (rightConf && rightConf.primary) {
    const img = await getImage(ASSET_DIR_PRIMARY + rightConf.primary).catch(()=>null);
    if (img) drawLogoWithShadow(rctx, img, LOGO_BOX.rightX, LOGO_BOX.y, adj.rightLogo, adj.logoShadow, adj.logoShadow.rightOn);
  }

  // Name + nickname per side, locked to the strip-divider anchors. Strip
  // shadow controls the per-team nameplate drop (left+right share one config).
  if (leftConf)  drawSideText(rctx, leftConf,  LEFT_TEXT_X,  'right', adj.leftName,  adj.leftNick,  adj.stripShadow);
  if (rightConf) drawSideText(rctx, rightConf, RIGHT_TEXT_X, 'left',  adj.rightName, adj.rightNick, adj.stripShadow);

  // Date / Time / Network strip — navy text on the gradient pill. Per-element
  // nudges let the operator dial the strip text into a shifted pill.
  rctx.fillStyle = '#0A254E';
  rctx.textAlign = 'center';
  rctx.textBaseline = 'middle';
  rctx.font = `400 11px "Proxima Nova","Barlow Condensed",sans-serif`;
  rctx.fillText(rowState.date,    487 + (adj.dateNudge.dx    || 0), 120 + (adj.dateNudge.dy    || 0));
  rctx.fillText(rowState.time,    540 + (adj.timeNudge.dx    || 0), 120 + (adj.timeNudge.dy    || 0));
  rctx.fillText(rowState.network, 593 + (adj.networkNudge.dx || 0), 120 + (adj.networkNudge.dy || 0));
}

// ─── Layout & main draw ───────────────────────────────────────────────────
function rowLayout(n){
  const titleH = TITLE_BAND_H;
  const maxRowW = CANVAS_W - SIDE_MARGIN * 2;
  const maxRowH = maxRowW / 8;  // matchup-row aspect is 8:1
  const availH = CANVAS_H - titleH - ROW_GAP * (n - 1) - 30;
  let rowH = Math.min(maxRowH, Math.floor(availH / n));
  let rowW = Math.round(rowH * 8);
  const x = Math.round((CANVAS_W - rowW) / 2);
  const totalH = n * rowH + (n - 1) * ROW_GAP;
  const yStart = titleH + Math.round((CANVAS_H - titleH - totalH) / 2);
  return { x, yStart, rowW, rowH, gap: ROW_GAP };
}

const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');

// Apply the canvas size + DOM aspect ratio when the operator toggles
// orientation. Called on init + on every orient-button click.
function applyOrientation(){
  if (state.orientation === 'portrait') {
    CANVAS_W = 1080; CANVAS_H = 1920;
  } else {
    CANVAS_W = 1920; CANVAS_H = 1080;
  }
  cvs.width = CANVAS_W;
  cvs.height = CANVAS_H;
  const wrap = document.getElementById('canvasWrap');
  if (wrap) wrap.style.aspectRatio = state.orientation === 'portrait' ? '9/16' : '16/9';
  const meta = document.querySelector('.preview-meta');
  if (meta) {
    const ratio = state.orientation === 'portrait' ? '9:16' : '16:9';
    meta.textContent = `${CANVAS_W} × ${CANVAS_H}  ·  Matchup Grid  ·  ${ratio}`;
  }
  document.querySelectorAll('#orientButtons .count-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.orient === state.orientation);
  });
}

// Cover-fit a source image into a target rect (used for the background
// image option). Crops symmetrically; preserves aspect ratio.
function drawCoverFit(rctx, img, x, y, w, h){
  const ar = img.naturalWidth / img.naturalHeight;
  const tar = w / h;
  let dw, dh;
  if (ar > tar) { dh = h; dw = h * ar; }
  else          { dw = w; dh = w / ar; }
  const dx = x - (dw - w) / 2;
  const dy = y - (dh - h) / 2;
  rctx.drawImage(img, dx, dy, dw, dh);
}

// Lazy-load + cache the canned CUSA pattern background.
let PATTERN_BG_IMG = null;
async function ensurePatternBg(){
  if (PATTERN_BG_IMG) return PATTERN_BG_IMG;
  try { PATTERN_BG_IMG = await getImage('assets/stark-strips.png'); }
  catch (_) { PATTERN_BG_IMG = null; }
  return PATTERN_BG_IMG;
}

async function draw(){
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

  // Background priority: pattern preset > uploaded image > solid color.
  if (state.bgPreset === 'pattern') {
    const img = await ensurePatternBg();
    if (img) drawCoverFit(ctx, img, 0, 0, CANVAS_W, CANVAS_H);
    else { ctx.fillStyle = state.previewBg || '#0a254e'; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H); }
  } else if (state.bgImage) {
    drawCoverFit(ctx, state.bgImage, 0, 0, CANVAS_W, CANVAS_H);
  } else {
    ctx.fillStyle = state.previewBg || '#0a254e';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  }

  // Title band.
  if (state.title) {
    ctx.fillStyle = '#FFFFFF';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `900 56px "Proxima Nova","Barlow Condensed",sans-serif`;
    ctx.fillText(state.title.toUpperCase(), CANVAS_W / 2, 50);
  }
  if (state.subtitle) {
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = `400 22px "Proxima Nova","Barlow Condensed",sans-serif`;
    ctx.fillText(state.subtitle, CANVAS_W / 2, 88);
  }

  // Render each row to an offscreen 1080×135 canvas, then drawImage onto
  // the main canvas at the layout position. Group transform (scale + dx/dy)
  // is applied around the rows-block center so the operator can shift +
  // resize all rows together without re-tuning per-row geometry.
  const layout = rowLayout(state.count);
  const adj = state.adj;
  const groupCenterX = layout.x + layout.rowW / 2;
  const blockTop     = layout.yStart;
  const blockH       = state.count * layout.rowH + (state.count - 1) * layout.gap;
  const groupCenterY = blockTop + blockH / 2;
  ctx.save();
  ctx.translate(groupCenterX + (adj.groupDx || 0), groupCenterY + (adj.groupDy || 0));
  ctx.scale(adj.groupScale || 1, adj.groupScale || 1);
  ctx.translate(-groupCenterX, -groupCenterY);
  for (let i = 0; i < state.count; i++) {
    const off = document.createElement('canvas');
    off.width = ROW_BASE_W;
    off.height = ROW_BASE_H;
    const rctx = off.getContext('2d');
    await drawRow(rctx, state.rows[i]);
    const y = layout.yStart + i * (layout.rowH + layout.gap);
    ctx.drawImage(off, layout.x, y, layout.rowW, layout.rowH);
  }
  ctx.restore();
}

// ─── UI: count picker, row cards, inputs ──────────────────────────────────
function escapeAttr(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function schoolOptionsHtml(selected){
  const cusa  = SCHOOLS.filter(s => CUSA_PRIORITY_NAMES.has(s.name));
  const other = SCHOOLS.filter(s => !CUSA_PRIORITY_NAMES.has(s.name));
  const opt = s => `<option value="${escapeAttr(s.name)}"${s.name === selected ? ' selected' : ''}>${escapeAttr(s.name)}${s.tricode ? ' · ' + s.tricode : ''}</option>`;
  const sep = '<option disabled>──────────</option>';
  return (cusa.length ? cusa.map(opt).join('') + sep : '') + other.map(opt).join('');
}

function renderRowCards(){
  const wrap = document.getElementById('rowCards');
  let html = '';
  for (let i = 0; i < state.count; i++) {
    const r = state.rows[i];
    html += `
      <div class="team-card">
        <div class="team-card-title">Matchup #${i + 1}</div>
        <div class="row-2">
          <div class="field"><label class="field-label">Left Team</label><select data-row="${i}" data-key="leftSchool">${schoolOptionsHtml(r.left.school)}</select></div>
          <div class="field"><label class="field-label">Right Team</label><select data-row="${i}" data-key="rightSchool">${schoolOptionsHtml(r.right.school)}</select></div>
        </div>
        <div class="row-2">
          <div class="field"><label class="field-label">Date</label><input data-row="${i}" data-key="date" type="text" maxlength="12" value="${escapeAttr(r.date)}"></div>
          <div class="field"><label class="field-label">Time</label><input data-row="${i}" data-key="time" type="text" maxlength="12" value="${escapeAttr(r.time)}"></div>
        </div>
        <div class="field"><label class="field-label">Network</label><input data-row="${i}" data-key="network" type="text" maxlength="12" value="${escapeAttr(r.network)}"></div>
      </div>`;
  }
  wrap.innerHTML = html;
  // Wire each row card's inputs.
  wrap.querySelectorAll('select[data-row], input[data-row]').forEach(el => {
    el.addEventListener(el.tagName === 'SELECT' ? 'change' : 'input', e => {
      const i = +el.dataset.row;
      const k = el.dataset.key;
      if (k === 'leftSchool')       state.rows[i].left.school  = el.value;
      else if (k === 'rightSchool') state.rows[i].right.school = el.value;
      else                          state.rows[i][k]           = el.value;
      persistState();
      draw();
    });
  });
}

// ─── Advanced adjustments — wire every input to state.adj ──────────────────
// Tight binder: detects element type and writes to the path on state.adj.
// `valId` (optional) is the small readout span; `fmt` is its formatter.
function setAdjPath(path, v){
  const parts = path.split('.');
  let o = state.adj;
  for (let i = 0; i < parts.length - 1; i++) o = o[parts[i]];
  o[parts[parts.length - 1]] = v;
}
function getAdjPath(path){
  const parts = path.split('.');
  let o = state.adj;
  for (const p of parts) { if (o == null) return undefined; o = o[p]; }
  return o;
}
function bindAdj(inputId, path, valId, fmt){
  const el = document.getElementById(inputId);
  if (!el) return;
  const valEl = valId ? document.getElementById(valId) : null;
  const ev = (el.type === 'checkbox' || el.tagName === 'SELECT') ? 'change' : 'input';
  el.addEventListener(ev, () => {
    const v = el.type === 'checkbox' ? el.checked
            : el.type === 'range'    ? +el.value
            : el.value;
    setAdjPath(path, v);
    if (valEl) valEl.textContent = fmt ? fmt(v) : String(v);
    persistState();
    draw();
  });
}

// Push state.adj values back into the inputs (called after restoreState
// during init so persisted adjustments rehydrate the UI).
function syncAdjUiFromState(){
  const a = state.adj;
  const setVal  = (id, v) => { const el = document.getElementById(id); if (el && el.type !== 'checkbox') el.value = v; };
  const setChk  = (id, v) => { const el = document.getElementById(id); if (el && el.type === 'checkbox') el.checked = !!v; };
  const setText = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  setVal('grpScale', a.groupScale); setText('grpScaleVal', (+a.groupScale).toFixed(2) + '×');
  setVal('grpDx',    a.groupDx);    setText('grpDxVal',    String(a.groupDx));
  setVal('grpDy',    a.groupDy);    setText('grpDyVal',    String(a.groupDy));
  setVal('koOpacity', a.koOpacity); setText('koOpacityVal', (+a.koOpacity).toFixed(2));
  setVal('koScale',   a.koScale);   setText('koScaleVal',   (+a.koScale).toFixed(2) + '×');
  ['leftLogo','rightLogo'].forEach(side => {
    const v = a[side];
    setVal(side + 'Scale', v.scale); setText(side + 'ScaleVal', (+v.scale).toFixed(2) + '×');
    setVal(side + 'Dx',    v.dx);    setText(side + 'DxVal',    String(v.dx));
    setVal(side + 'Dy',    v.dy);    setText(side + 'DyVal',    String(v.dy));
  });
  ['leftName','leftNick','rightName','rightNick'].forEach(k => {
    const v = a[k];
    setVal(k + 'Dx', v.dx); setText(k + 'DxVal', String(v.dx));
    setVal(k + 'Dy', v.dy); setText(k + 'DyVal', String(v.dy));
  });
  ['date','time','net'].forEach(k => {
    const src = k === 'net' ? a.networkNudge : a[k + 'Nudge'];
    setVal(k + 'Dx', src.dx); setText(k + 'DxVal', String(src.dx));
    setVal(k + 'Dy', src.dy); setText(k + 'DyVal', String(src.dy));
  });
  setChk('logoShadowL', a.logoShadow.leftOn);
  setChk('logoShadowR', a.logoShadow.rightOn);
  setVal('logoShadowColor', a.logoShadow.color || '#000000');
  setVal('logoShadowA',  a.logoShadow.alpha); setText('logoShadowAVal',  (+a.logoShadow.alpha).toFixed(2));
  setVal('logoShadowDx', a.logoShadow.dx);    setText('logoShadowDxVal', String(a.logoShadow.dx));
  setVal('logoShadowDy', a.logoShadow.dy);    setText('logoShadowDyVal', String(a.logoShadow.dy));
  setVal('logoShadowB',  a.logoShadow.blur);  setText('logoShadowBVal',  String(a.logoShadow.blur));
  setChk('stripShadowOn',    a.stripShadow.on);
  setVal('stripShadowColor', a.stripShadow.color || '#000000');
  setVal('stripShadowA',  a.stripShadow.alpha); setText('stripShadowAVal',  (+a.stripShadow.alpha).toFixed(2));
  setVal('stripShadowDx', a.stripShadow.dx);    setText('stripShadowDxVal', String(a.stripShadow.dx));
  setVal('stripShadowDy', a.stripShadow.dy);    setText('stripShadowDyVal', String(a.stripShadow.dy));
  setVal('stripShadowB',  a.stripShadow.blur);  setText('stripShadowBVal',  String(a.stripShadow.blur));
  setChk('koShadowL', a.koShadow.leftOn);
  setChk('koShadowR', a.koShadow.rightOn);
  setVal('koShadowColor', a.koShadow.color || '#000000');
  setVal('koShadowA',  a.koShadow.alpha); setText('koShadowAVal',  (+a.koShadow.alpha).toFixed(2));
  setVal('koShadowDx', a.koShadow.dx);    setText('koShadowDxVal', String(a.koShadow.dx));
  setVal('koShadowDy', a.koShadow.dy);    setText('koShadowDyVal', String(a.koShadow.dy));
  setVal('koShadowB',  a.koShadow.blur);  setText('koShadowBVal',  String(a.koShadow.blur));
  setVal('leftSqBlend',  a.leftSquare.blend);
  setVal('rightSqBlend', a.rightSquare.blend);
  setVal('leftSqColor',  a.leftSquare.color  || '#000000');
  setVal('rightSqColor', a.rightSquare.color || '#000000');
}

  restoreState();

  if (document.fonts && document.fonts.load) {
    try { await document.fonts.load(`400 22px "Proxima Nova"`); } catch (_) {}
    try { await document.fonts.load(`700 ${NICK_FS}px "Proxima Nova"`); } catch (_) {}
    try { await document.fonts.load(`900 56px "Proxima Nova"`); } catch (_) {}
  }
  draw();
  if (window.cusaPage) window.cusaPage.boot({ pageKey: 'matchup-grid', stateKey: STATE_KEY });
})();
