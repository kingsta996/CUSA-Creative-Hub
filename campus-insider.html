<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CUSA Campus Insider Lower-Third Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;700&display=swap">
<style>
@font-face{font-family:'Proxima Nova';font-weight:400;font-style:normal;src:url('fonts/ProximaNovaRegular.woff') format('woff'),url('fonts/ProximaNovaRegular.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Proxima Nova';font-weight:700;font-style:normal;src:url('fonts/ProximaNovaBold.woff') format('woff'),url('fonts/ProximaNovaBold.ttf') format('truetype');font-display:swap}
@font-face{font-family:'Proxima Nova';font-weight:900;font-style:normal;src:url('fonts/ProximaNovaBlack.woff') format('woff'),url('fonts/ProximaNovaBlack.ttf') format('truetype');font-display:swap}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Barlow',sans-serif;background:#060f1a;color:#fff}
body{display:flex;flex-direction:column;overflow:hidden}

/* ── Topbar ── */
.topbar{width:100%;background:#0a1624;border-bottom:2px solid rgba(235,25,70,0.5);display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:54px;flex-shrink:0;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-logo{height:30px;width:auto;display:block;filter:drop-shadow(0 2px 12px rgba(235,25,70,0.25))}
.topbar-sep{width:1px;height:22px;background:rgba(255,255,255,0.2)}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;letter-spacing:2px;color:#fff}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-status{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,0.5)}
.topbar-status.error{color:#ff6f8b}
.back{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.6);text-decoration:none;border:1px solid rgba(255,255,255,0.18);padding:7px 12px;border-radius:4px}
.back:hover{color:#fff;border-color:rgba(235,25,70,0.6)}

/* ── Tabs ── */
.tabs{width:100%;background:rgba(10,22,36,0.9);border-bottom:1px solid rgba(255,255,255,0.08);display:flex;gap:0;padding:0 12px;flex-shrink:0}
.tab{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.45);text-transform:uppercase;background:transparent;border:none;padding:11px 18px;cursor:pointer;border-bottom:2px solid transparent}
.tab:hover{color:rgba(255,255,255,0.75)}
.tab.active{color:#fff;border-bottom-color:#EB1946}

/* ── Main grid ── */
.main{display:flex;width:100%;gap:14px;padding:12px;flex:1;min-height:0;overflow:hidden}

/* Disabled select look (used when Interview locks plate count) */
select:disabled{opacity:0.45;cursor:not-allowed}

/* ── Left controls panel ── */
.panel{background:#0e1d2e;border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:14px;width:340px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;overflow-y:auto;height:100%}
.panel-head{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:3px;color:rgba(235,25,70,0.85);text-transform:uppercase;padding-bottom:6px;border-bottom:1px solid rgba(235,25,70,0.18)}

.field{display:flex;flex-direction:column;gap:5px}
.field-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;color:rgba(255,255,255,0.55);text-transform:uppercase}
.field input[type=text],.field input[type=number],.field select{font-family:'Barlow',sans-serif;font-size:13px;background:#0a1624;color:#fff;border:1px solid rgba(255,255,255,0.18);border-radius:4px;padding:8px 10px;width:100%}
.field input[type=text]:focus,.field input[type=number]:focus,.field select:focus{outline:none;border-color:#EB1946}
.field input[type=range]{width:100%}
.scale-row{display:flex;align-items:center;gap:10px}
.scale-readout{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:rgba(255,255,255,0.65);min-width:38px;text-align:right}
.nudge-readout{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;color:rgba(235,25,70,0.85);margin-left:6px}

.row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

.frame-card{border:1px solid rgba(235,25,70,0.18);border-radius:6px;padding:10px 11px;background:rgba(235,25,70,0.04);display:flex;flex-direction:column;gap:8px}
.frame-card-title{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:3px;color:rgba(235,25,70,0.85);text-transform:uppercase}

.btn{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:2px;color:#fff;background:#EB1946;border:none;padding:11px 16px;border-radius:4px;cursor:pointer;text-transform:uppercase;width:100%}
.btn:hover{background:#c91240}
.btn.secondary{background:transparent;border:1px solid rgba(255,255,255,0.25)}
.btn.secondary:hover{background:rgba(255,255,255,0.06)}

.panel-spacer{flex:1}

/* ── Canvas area ── */
.canvas-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:0;min-height:0;height:100%;padding:8px}
.canvas-wrap{position:relative;aspect-ratio:16/9;max-width:100%;max-height:100%;width:auto;height:auto;background:transparent;border:1px dashed rgba(255,255,255,0.10);border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center}
.canvas-wrap canvas{display:block;width:100%;height:100%}
.preview-meta{margin-top:10px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.35);text-align:center}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" aria-label="CUSA Creative Hub"><img class="topbar-logo" src="assets/cusa-primary-white.png" alt="Conference USA"></a>
    <div class="topbar-sep"></div>
    <div class="topbar-title">CAMPUS INSIDER</div>
  </div>
  <div class="topbar-right">
    <div id="topStatus" class="topbar-status"></div>
    <a class="back" href="index.html">← HUB</a>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-mode="standard">Standard Lower-Third</button>
  <button class="tab" data-mode="interview">Interview · Inside The Huddle</button>
  <button class="tab" data-mode="matchup">Matchup &amp; Final Score</button>
  <button class="tab" data-mode="player-stats">Player + Stats</button>
</div>

<!-- iframe-embedded React app (lazy-loaded on first activation) -->
<div class="matchup-frame" id="matchupFrame" style="display:none;flex:1;min-height:0;width:100%">
  <iframe id="matchupIframe" src="about:blank" style="width:100%;height:100%;border:none;background:#060f1a;display:block"></iframe>
</div>

<div class="main" id="mainBuilder">

  <!-- ── Left controls panel ── -->
  <div class="panel" id="panel">
    <!-- Standard / Interview controls -->
    <div id="standardSections" style="display:flex;flex-direction:column;gap:12px">
      <div class="panel-head">Layout</div>
      <div class="field">
        <label class="field-label" for="frameCount">Plate Count</label>
        <select id="frameCount">
          <option value="1">Single Plate</option>
          <option value="2" selected>Two-Plate (16:9)</option>
          <option value="3">Three-Plate (16:9)</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label" for="scale">Plate Size · linked</label>
        <div class="scale-row">
          <input id="scale" type="range" min="0.30" max="1.30" step="0.01" value="0.60">
          <span id="scaleReadout" class="scale-readout">60%</span>
        </div>
      </div>
      <div class="field">
        <label class="field-label" for="bgRef">Framing Reference · preview only</label>
        <select id="bgRef">
          <option value="">None (transparent)</option>
          <option value="single-host">Single-Host (Insider)</option>
          <option value="two-host">Two-Host (Insider)</option>
          <option value="inside-the-huddle">Inside The Huddle (Interview)</option>
        </select>
        <label style="display:flex;align-items:center;gap:8px;margin-top:6px;font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;color:rgba(255,255,255,0.55);text-transform:uppercase;cursor:pointer">
          <input type="checkbox" id="bgInExport" style="margin:0;width:auto"> Include reference in exported PNG
        </label>
      </div>

      <div class="panel-head" style="margin-top:6px">Plates</div>
      <div id="frames" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>

    <!-- Player + Stats controls (hidden until that tab is active) -->
    <div id="playerStatsSections" style="display:none;flex-direction:column;gap:12px">
      <div class="panel-head">Player</div>
      <div class="field">
        <label class="field-label" for="psSport">Sport</label>
        <select id="psSport"></select>
      </div>
      <div class="field">
        <label class="field-label" for="psSchool">School</label>
        <select id="psSchool"></select>
      </div>
      <div class="field">
        <label class="field-label" for="psName">Player Name</label>
        <input id="psName" type="text" maxlength="40" value="">
      </div>
      <div class="row-2">
        <div class="field">
          <label class="field-label" for="psPosition">Position</label>
          <input id="psPosition" type="text" maxlength="6" value="">
        </div>
        <div class="field">
          <label class="field-label" for="psJersey">Jersey</label>
          <input id="psJersey" type="text" maxlength="3" value="">
        </div>
      </div>

      <div class="panel-head" style="margin-top:6px">Pull from Master Roster</div>
      <div class="field">
        <label class="field-label" for="psPlayerPick">Player</label>
        <select id="psPlayerPick"><option value="">— Click Load below —</option></select>
      </div>
      <button class="btn secondary" id="psLoadRoster" style="font-size:10px;padding:8px 10px">📥 Load Roster for School + Sport</button>

      <div class="panel-head" style="margin-top:6px">Stats</div>
      <div id="psStats" style="display:flex;flex-direction:column;gap:10px"></div>
      <button class="btn secondary" id="psResetDefaults" style="font-size:10px;padding:8px 10px">Reset Stat Labels for Sport</button>
    </div>

    <div class="panel-spacer"></div>
    <button class="btn" id="download">Download PNG</button>
  </div>

  <!-- ── Center preview ── -->
  <div class="canvas-area">
    <div class="canvas-wrap">
      <canvas id="cvs" width="1920" height="1080"></canvas>
    </div>
    <div class="preview-meta">1920 × 1080  ·  Proxima Nova Bold  ·  #06253a  ·  exports as transparent PNG</div>
  </div>

</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────
const SCHOOLS = [
  { id:'CUSA',             name:'CUSA (Conference)' },
  { id:'Delaware',         name:'Delaware' },
  { id:'FIU',              name:'FIU' },
  { id:'Jax State',        name:'Jacksonville State' },
  { id:'Kennesaw State',   name:'Kennesaw State' },
  { id:'Liberty',          name:'Liberty' },
  { id:'Middle Tennessee', name:'Middle Tennessee' },
  { id:'MO State',         name:'Missouri State' },
  { id:'Sam Houston',      name:'Sam Houston' },
  { id:'Western Kentucky', name:'Western Kentucky' },
];
const FOLDER = 'Nameplate Lower-Third';
const FILE   = id => `${FOLDER}/Nameplate Lower-Thirds Only - ${id}.png`;

// Nameplate bbox in the source 1920x1080 PNG
const SRC = { left:560, right:1410, top:769, bottom:976, w:850, h:207 };
const SRC_CX = (SRC.left + SRC.right) / 2;   // 985
const SRC_CY = (SRC.top  + SRC.bottom) / 2;  // 872.5

// Text metrics (source PNG coords)
const TEXT_COLOR  = '#06253a';
const FONT_FAMILY = "'Proxima Nova','proxima-nova','Montserrat','Helvetica Neue',Arial,sans-serif";
const HEADER_EM   = 76;
const SUB_EM      = 24;
const HEADER_CY   = 865;
const SUB_CY      = 944;
const TEXT_CX     = 991;

const CANVAS_W = 1920, CANVAS_H = 1080;
const MARGIN_X = 40;

const DEFAULT_SCALE  = { 1:1.00, 2:0.60, 3:0.45 };
const DEFAULT_ALIGNS = { 1:['center'], 2:['left','right'], 3:['left','center','right'] };
const DEFAULT_BG_REF = { 1:'single-host', 2:'two-host', 3:'' };
const BG_REF_FILE = id => `frame-references/${id}.png`;

// Interview mode: locked 2-plate layout positioned BELOW the Inside The Huddle webcam frames.
// Calibrated from "Nameplate Reference" overlay: at 0.92 scale, target plate bboxes are
// LEFT  x=[117,901],  cy≈937 (bottom y≈1029)
// RIGHT x=[1057,1842], cy≈935 (bottom y≈1024)
const INTERVIEW_DEFAULTS = {
  scale: 0.92,
  bgRef: 'inside-the-huddle',
  bgInExport: true,
  plates: [
    { align:'left',  xOff:  77, yOff: 50 },
    { align:'right', xOff: -38, yOff: 50 },
  ],
};
const STARTER = [
  { header:'JOHN DOE',   sub:'LIBERTY HEAD COACH' },
  { header:'JANE SMITH', sub:'CUSA INSIDER' },
  { header:'CHRIS LEE',  sub:'JAX STATE PLAYER' },
];

// ─── Player + Stats config ────────────────────────────────────────────────
// Default stat slate per sport. Operator can edit both label and value before
// download; "Reset Stat Labels for Sport" pulls these defaults back in.
// Football has separate QB / Skill entries (per yesterday's open question).
const SPORT_STATS = {
  "Men's Basketball":   { defPos:'G',  stats:[['PPG','23.4'], ['RPG','8.2'], ['APG','4.9']] },
  "Women's Basketball": { defPos:'G',  stats:[['PPG','18.6'], ['RPG','6.4'], ['APG','5.1']] },
  'Football · QB':      { defPos:'QB', stats:[['YDS','2,847'],['TD','24'],   ['INT','7']]   },
  'Football · Skill':   { defPos:'WR', stats:[['YDS','1,124'],['TD','11'],   ['REC','68']]  },
  'Baseball':           { defPos:'OF', stats:[['AVG','.344'],['HR','12'],   ['RBI','48']]  },
  'Softball':           { defPos:'OF', stats:[['AVG','.412'],['HR','9'],    ['RBI','37']]  },
  'Volleyball':         { defPos:'OH', stats:[['K','3.92'],  ['D','2.41'],  ['A','0.32']]  },
  "Women's Soccer":     { defPos:'F',  stats:[['G','11'],    ['A','7'],     ['GP','18']]   },
};

const PS_DEFAULT_SPORT = "Men's Basketball";

// ─── Master Roster (Phase 2A: identity pre-fill) ──────────────────────────
// Reads the same Google Sheet that the Production Hub's roster.html uses, via
// the gviz JSON endpoint (no XLSX dependency needed). Cached after first fetch.
const MASTER_ROSTER_SHEET_ID = '1NpjMZH0p70pYAnZ_BkqxevJ5XoZDoeucZq4nF1cAw50';
const MASTER_ROSTER_TAB      = 'Master Roster';

// Map Creative Hub school IDs (used in the SCHOOLS array + nameplate filenames)
// to the exact "School" column value in the Master Roster sheet.
const MASTER_ROSTER_SCHOOL_MAP = {
  'CUSA':              null,                  // conference, no roster to pull
  'Delaware':          'Delaware',
  'FIU':               'FIU',
  'Jax State':         'Jacksonville State',
  'Kennesaw State':    'Kennesaw State',
  'Liberty':           'Liberty',
  'Middle Tennessee':  'Middle Tennessee',
  'MO State':          'Missouri State',
  'Sam Houston':       'Sam Houston',
  'Western Kentucky':  'WKU',
};

// Map Creative Hub sport IDs (SPORT_STATS keys) to the sheet's "Sport" column.
const MASTER_ROSTER_SPORT_MAP = {
  "Men's Basketball":   'MBB',
  "Women's Basketball": 'WBB',
  'Football · QB':      'Football',
  'Football · Skill':   'Football',
  'Baseball':           'Baseball',
  'Softball':           'Softball',
  'Volleyball':         'Volleyball',
  "Women's Soccer":     'Soccer',
};

let _masterRosterCache = null;  // { rows: [...], fetchedAt: ms }

// Position normalization for the picker pre-fill. The sheet stores positions
// as full names ("Outfield", "Right Handed Pitcher") but broadcast graphics
// want abbreviations. Combos like "Infield/ Outfield" take the first segment.
const MASTER_ROSTER_POS_MAP = {
  'Football': {
    'quarterback': 'QB', 'wide receiver': 'WR', 'tight end': 'TE',
    'running back': 'RB', 'fullback': 'FB', 'halfback': 'HB',
    'offensive line': 'OL', 'offensive lineman': 'OL', 'center': 'C',
    'offensive guard': 'OG', 'offensive tackle': 'OT',
    'left guard': 'LG', 'left tackle': 'LT', 'right guard': 'RG', 'right tackle': 'RT',
    'defensive line': 'DL', 'defensive lineman': 'DL', 'nose tackle': 'NT',
    'defensive tackle': 'DT', 'defensive end': 'DE',
    'linebacker': 'LB', 'middle linebacker': 'MLB',
    'outside linebacker': 'OLB', 'inside linebacker': 'ILB',
    'defensive back': 'DB', 'cornerback': 'CB', 'safety': 'S',
    'free safety': 'FS', 'strong safety': 'SS',
    'kicker': 'K', 'punter': 'P', 'long snapper': 'LS',
    'place kicker': 'K', 'placekicker': 'K',
    'kick returner': 'KR', 'punt returner': 'PR',
  },
  'MBB': { 'guard': 'G', 'forward': 'F', 'center': 'C' },
  'WBB': { 'guard': 'G', 'forward': 'F', 'center': 'C' },
  'Baseball': {
    'pitcher': 'P',
    'right handed pitcher': 'RHP', 'right-handed pitcher': 'RHP',
    'left handed pitcher': 'LHP',  'left-handed pitcher': 'LHP',
    'catcher': 'C',
    'infield': 'INF', 'infielder': 'INF',
    'outfield': 'OF', 'outfielder': 'OF',
    'utility': 'UTL', 'util': 'UTL',
    'designated hitter': 'DH',
    'first base': '1B', 'second base': '2B', 'third base': '3B', 'shortstop': 'SS',
  },
  'Softball': {
    'pitcher': 'P',
    'right handed pitcher': 'RHP', 'right-handed pitcher': 'RHP',
    'left handed pitcher': 'LHP',  'left-handed pitcher': 'LHP',
    'catcher': 'C',
    'infield': 'INF', 'infielder': 'INF',
    'outfield': 'OF', 'outfielder': 'OF',
    'utility': 'UTL',
    'designated player': 'DP',
    'first base': '1B', 'second base': '2B', 'third base': '3B', 'shortstop': 'SS',
  },
  'Volleyball': {
    'outside hitter': 'OH', 'outside': 'OH',
    'middle blocker': 'MB', 'middle hitter': 'MB', 'middle': 'MB',
    'setter': 'S', 'libero': 'L', 'defensive specialist': 'L',
    'opposite': 'OPP', 'opposite hitter': 'OPP',
    'right side': 'OPP', 'right side hitter': 'OPP',
  },
  'Soccer': {
    'goalkeeper': 'GK', 'goal keeper': 'GK', 'keeper': 'GK',
    'defender': 'D', 'defense': 'D', 'back': 'D',
    'midfielder': 'M', 'midfield': 'M',
    'forward': 'F', 'striker': 'F', 'attacker': 'F',
  },
};

function normalizeMasterPosition(raw, masterSport){
  if (!raw) return '';
  const map = MASTER_ROSTER_POS_MAP[masterSport];
  if (!map) return raw.trim();
  // Combos like "Infield/ Outfield" or "RB/WR" — take the first segment.
  const first = String(raw).split(/[\/,]| or /i)[0].trim().toLowerCase();
  if (!first) return raw.trim();
  return map[first] || raw.trim().toUpperCase();
}

// ─── State ────────────────────────────────────────────────────────────────
const state = {
  mode:'standard', frameCount:2, scale:0.60, frames:[],
  bgRef:'two-host', bgInExport:false, bgRefImg:null,
  // Player + Stats mode
  playerStats: {
    sport: PS_DEFAULT_SPORT,
    position: SPORT_STATS[PS_DEFAULT_SPORT].defPos,
    jersey: '1',
    stats: SPORT_STATS[PS_DEFAULT_SPORT].stats.map(([l,v]) => ({label:l, value:v})),
  },
};

// ─── DOM refs ─────────────────────────────────────────────────────────────
const cvs        = document.getElementById('cvs');
const ctx        = cvs.getContext('2d');
const fcSel      = document.getElementById('frameCount');
const scaleR     = document.getElementById('scale');
const scaleN     = document.getElementById('scaleReadout');
const framesEl   = document.getElementById('frames');
const topStatus  = document.getElementById('topStatus');
const bgRefSel   = document.getElementById('bgRef');
const bgInExport = document.getElementById('bgInExport');

function setStatus(msg, isErr){
  topStatus.textContent = msg || '';
  topStatus.classList.toggle('error', !!isErr);
}

// ─── Image loader ─────────────────────────────────────────────────────────
const imgCache = new Map();
function loadImage(src){
  if (imgCache.has(src)) return imgCache.get(src);
  const p = new Promise((resolve, reject) => {
    const img = new Image();
    img.onload  = () => resolve(img);
    img.onerror = () => reject(new Error('Image load failed: ' + img.src));
    img.src = src;
  });
  imgCache.set(src, p);
  return p;
}
const loadBg    = id => loadImage(encodeURI(FILE(id)));
const loadBgRef = id => loadImage(encodeURI(BG_REF_FILE(id)));

// ─── Layout math ──────────────────────────────────────────────────────────
function plateTargetCenter(align, scale){
  const plateW = SRC.w * scale;
  let cx;
  if (align === 'left')       cx = MARGIN_X + plateW / 2;
  else if (align === 'right') cx = CANVAS_W - MARGIN_X - plateW / 2;
  else                        cx = CANVAS_W / 2;
  const cy = SRC.bottom - (SRC.h * scale) / 2;
  return { cx, cy };
}

// ─── Frame factory ────────────────────────────────────────────────────────
function makeFrame(idx){
  const aligns = DEFAULT_ALIGNS[state.frameCount];
  const align = aligns[idx] || 'center';
  const starter = STARTER[idx] || STARTER[0];
  return { school:'Liberty', header:starter.header, sub:starter.sub, align, xOff:0, yOff:0, bgImg:null };
}

function escapeAttr(s){ return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function renderFrameControls(){
  framesEl.innerHTML = '';
  state.frames.forEach((f, i) => {
    const card = document.createElement('div');
    card.className = 'frame-card';
    card.innerHTML = `
      <div class="frame-card-title">Plate ${i+1}</div>
      <div class="field">
        <label class="field-label">School</label>
        <select data-i="${i}" data-k="school">
          ${SCHOOLS.map(s => `<option value="${s.id}"${s.id===f.school?' selected':''}>${s.name}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label class="field-label">Header (Name)</label>
        <input data-i="${i}" data-k="header" type="text" value="${escapeAttr(f.header)}" maxlength="40">
      </div>
      <div class="field">
        <label class="field-label">Subheader (Title)</label>
        <input data-i="${i}" data-k="sub" type="text" value="${escapeAttr(f.sub)}" maxlength="60">
      </div>
      <div class="field">
        <label class="field-label">Alignment</label>
        <select data-i="${i}" data-k="align">
          <option value="left"${f.align==='left'?' selected':''}>Left</option>
          <option value="center"${f.align==='center'?' selected':''}>Center</option>
          <option value="right"${f.align==='right'?' selected':''}>Right</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">X Nudge <span class="nudge-readout" data-readout="x-${i}">${f.xOff}px</span></label>
        <input data-i="${i}" data-k="xOff" type="range" min="-900" max="900" step="5" value="${f.xOff}">
      </div>
      <div class="field">
        <label class="field-label">Y Nudge <span class="nudge-readout" data-readout="y-${i}">${f.yOff}px</span></label>
        <input data-i="${i}" data-k="yOff" type="range" min="-700" max="100" step="5" value="${f.yOff}">
      </div>
      <button class="btn secondary" data-i="${i}" data-k="reset" style="font-size:10px;padding:6px 10px">Reset Position</button>
    `;
    framesEl.appendChild(card);
  });
  framesEl.querySelectorAll('input,select').forEach(el => {
    const evt = (el.tagName === 'SELECT') ? 'change' : 'input';
    el.addEventListener(evt, onFrameInput);
  });
  framesEl.querySelectorAll('button[data-k="reset"]').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = +btn.dataset.i;
      state.frames[i].xOff = 0;
      state.frames[i].yOff = 0;
      renderFrameControls();
      draw();
    });
  });
}

async function onFrameInput(e){
  const i = +e.target.dataset.i;
  const k = e.target.dataset.k;
  const isRange = e.target.type === 'range';
  const v = (e.target.type === 'number' || isRange) ? Number(e.target.value || 0) : e.target.value;
  state.frames[i][k] = v;
  if (isRange) {
    const axis = k === 'xOff' ? 'x' : 'y';
    const ro = framesEl.querySelector(`[data-readout="${axis}-${i}"]`);
    if (ro) ro.textContent = v + 'px';
  }
  if (k === 'school') await ensureBg(state.frames[i]);
  draw();
}

// ─── Frame count / scale ──────────────────────────────────────────────────
// ─── Mode (tab) switching ─────────────────────────────────────────────────
const matchupFrame  = document.getElementById('matchupFrame');
const matchupIframe = document.getElementById('matchupIframe');
const mainBuilder   = document.getElementById('mainBuilder');

async function applyMode(mode){
  state.mode = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));

  // Matchup tab: swap the builder UI for an embedded React app via iframe.
  if (mode === 'matchup') {
    if (matchupIframe.src === 'about:blank' || !matchupIframe.src.includes('podcast-graphics')) {
      matchupIframe.src = 'podcast-graphics/index.html?embedded=1';
    }
    mainBuilder.style.display = 'none';
    matchupFrame.style.display = 'flex';
    return;
  }
  matchupFrame.style.display = 'none';
  mainBuilder.style.display = 'flex';

  // Toggle the panel sections between Standard/Interview vs Player+Stats.
  const inPlayerStats = (mode === 'player-stats');
  document.getElementById('standardSections').style.display = inPlayerStats ? 'none' : 'flex';
  document.getElementById('playerStatsSections').style.display = inPlayerStats ? 'flex' : 'none';

  if (inPlayerStats) {
    // Lock to a single centered plate at full scale (the stat block geometry
    // is calibrated to plate-at-1.0 in source-PNG coords).
    state.frameCount = 1;
    fcSel.value = '1';
    state.scale = 1.0;
    scaleR.value = String(state.scale);
    scaleN.textContent = Math.round(state.scale * 100) + '%';
    while (state.frames.length < 1) state.frames.push(makeFrame(0));
    state.frames.length = 1;
    state.frames[0].align = 'center';
    state.frames[0].xOff = 0;
    state.frames[0].yOff = 0;
    if (!state.frames[0].school) state.frames[0].school = 'Liberty';
    state.bgRef = '';
    bgRefSel.value = '';
    state.bgInExport = false;
    bgInExport.checked = false;
    syncFrameFromPlayerStats();
    renderPlayerStatsControls();
    await Promise.all([...state.frames.map(ensureBg), ensureBgRef()]);
    draw();
    return;
  }

  if (mode === 'interview') {
    // Lock 2-plate, set Inside The Huddle defaults.
    state.frameCount = 2;
    fcSel.value = '2';
    fcSel.disabled = true;
    state.scale = INTERVIEW_DEFAULTS.scale;
    scaleR.value = String(state.scale);
    scaleN.textContent = Math.round(state.scale * 100) + '%';
    while (state.frames.length < 2) state.frames.push(makeFrame(state.frames.length));
    state.frames.length = 2;
    INTERVIEW_DEFAULTS.plates.forEach((p, i) => {
      state.frames[i].align = p.align;
      state.frames[i].xOff = p.xOff;
      state.frames[i].yOff = p.yOff;
    });
    state.bgRef = INTERVIEW_DEFAULTS.bgRef;
    bgRefSel.value = state.bgRef;
    state.bgInExport = INTERVIEW_DEFAULTS.bgInExport;
    bgInExport.checked = state.bgInExport;
  } else {
    // Standard: re-enable the count selector and apply count-based defaults.
    fcSel.disabled = false;
    state.scale = DEFAULT_SCALE[state.frameCount];
    scaleR.value = String(state.scale);
    scaleN.textContent = Math.round(state.scale * 100) + '%';
    const aligns = DEFAULT_ALIGNS[state.frameCount];
    state.frames.forEach((f, i) => { f.align = aligns[i]; f.xOff = 0; f.yOff = 0; });
    state.bgRef = DEFAULT_BG_REF[state.frameCount] || '';
    bgRefSel.value = state.bgRef;
  }
  renderFrameControls();
  await Promise.all([...state.frames.map(ensureBg), ensureBgRef()]);
  draw();
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => applyMode(t.dataset.mode));
});

fcSel.addEventListener('change', async () => {
  const n = +fcSel.value;
  state.frameCount = n;
  state.scale = DEFAULT_SCALE[n];
  scaleR.value = String(state.scale);
  scaleN.textContent = Math.round(state.scale * 100) + '%';
  while (state.frames.length < n) state.frames.push(makeFrame(state.frames.length));
  state.frames.length = n;
  const aligns = DEFAULT_ALIGNS[n];
  state.frames.forEach((f, i) => { f.align = aligns[i]; f.xOff = 0; f.yOff = 0; });
  // Auto-pick a sensible reference for the new layout
  state.bgRef = DEFAULT_BG_REF[n] || '';
  bgRefSel.value = state.bgRef;
  renderFrameControls();
  await Promise.all([...state.frames.map(ensureBg), ensureBgRef()]);
  draw();
});

bgRefSel.addEventListener('change', async () => {
  state.bgRef = bgRefSel.value;
  await ensureBgRef();
  draw();
});

bgInExport.addEventListener('change', () => {
  state.bgInExport = bgInExport.checked;
});

scaleR.addEventListener('input', () => {
  state.scale = parseFloat(scaleR.value);
  scaleN.textContent = Math.round(state.scale * 100) + '%';
  draw();
});

async function ensureBg(frame){
  try {
    frame.bgImg = await loadBg(frame.school);
    setStatus('');
  } catch (e) {
    frame.bgImg = null;
    setStatus('Could not load "' + frame.school + '". Open via http://localhost:8765/.', true);
    console.error(e);
  }
}

async function ensureBgRef(){
  if (!state.bgRef) { state.bgRefImg = null; return; }
  try {
    state.bgRefImg = await loadBgRef(state.bgRef);
  } catch (e) {
    state.bgRefImg = null;
    setStatus('Could not load reference "' + state.bgRef + '".', true);
    console.error(e);
  }
}

// ─── Player + Stats helpers ───────────────────────────────────────────────
// Position + jersey now render IN the plate's gray bar (in front of the name),
// so frame.sub is unused in this mode. Header still holds the player name.
function syncFrameFromPlayerStats(){
  const f = state.frames[0];
  if (!f) return;
  f.header = (document.getElementById('psName')?.value || f.header || 'PLAYER NAME').toUpperCase();
  f.sub = '';  // suppressed — pos/jersey live in the gray bar prefix
}

// Gray-bar prefix layout: [POS] [#JERSEY] [NAME], left-to-right, all navy,
// vertically centered on the gray band (HEADER_CY). Left-aligned starting
// just past the school logo (source x=775 → canvas x≈750 at scale 1.0).
const GB_POS_FS    = 40;   // Position
const GB_JERSEY_FS = 56;   // Jersey
const GB_GAP_PJ    = 16;   // Gap between position and jersey
const GB_GAP_JN    = 24;   // Gap between jersey and name
const GB_LEFT_X    = 775;  // source x — start of gray-bar text layout

// Stats layout splits the original white bar into:
//   • Color bar (school primary) at y=926..944 — category labels in school FG
//   • White value strip at y=944..964 — values in navy
const COLOR_BAR_TOP    = 926;
const COLOR_BAR_BOTTOM = 944;
const COLOR_BAR_LEFT_BASE  = 745;   // source x → keeps left edge at canvas 720 (just past logo)
const COLOR_BAR_RIGHT_BASE = 1370;  // source x → tracks plate right edge as it extends
const CAT_LABEL_FS  = 16;
const CAT_LABEL_CY  = 935;
const WB_VALUE_FS    = 24;
const WB_VALUE_CY    = 954;          // centered in the remaining white area
const WB_BLOCK_BASES = [820, 985, 1150];  // source x of each stat block center

// School primary colors for the category bar. Hex values pulled from
// IMS_Color_Mapping.xlsx (Swatch column, ESPN Primary fallback). `fg` is the
// text color used on top of `bg` — white for dark bars, near-black on the
// gold (Kennesaw) where contrast against white type would fail.
const SCHOOL_PRIMARY_COLORS = {
  'CUSA':              { bg: '#00263A', fg: '#FFFFFF' },
  'Delaware':          { bg: '#00539F', fg: '#FFFFFF' },
  'FIU':               { bg: '#091F3F', fg: '#FFFFFF' },
  'Jax State':         { bg: '#CC0000', fg: '#FFFFFF' },
  'Kennesaw State':    { bg: '#FDBB30', fg: '#0A0A0A' },
  'Liberty':           { bg: '#0A254E', fg: '#FFFFFF' },
  'Middle Tennessee':  { bg: '#036EB7', fg: '#FFFFFF' },
  'MO State':          { bg: '#5E0009', fg: '#FFFFFF' },
  'Sam Houston':       { bg: '#FF5000', fg: '#FFFFFF' },
  'Western Kentucky':  { bg: '#E13A3E', fg: '#FFFFFF' },
};

function measureGrayBarPrefix(name, position, jersey){
  ctx.save();
  let w = 0;
  if (position) {
    ctx.font = `800 ${GB_POS_FS}px 'Barlow Condensed','Barlow',${FONT_FAMILY}`;
    w += ctx.measureText(position).width + GB_GAP_PJ;
  }
  if (jersey) {
    ctx.font = `900 ${GB_JERSEY_FS}px ${FONT_FAMILY}`;
    w += ctx.measureText(jersey).width + GB_GAP_JN;
  }
  ctx.font = `700 ${HEADER_EM}px ${FONT_FAMILY}`;
  w += ctx.measureText(String(name || '')).width;
  ctx.restore();
  return w;
}

// Player + Stats plate has its own extension formula. Layout is left-aligned
// starting at canvas x=750 (just past every school's logo); plate's safe
// right edge before the decorative swoosh starts is canvas x=1320. So the
// budget = 570px, minus 15px margin = 555. When grayW exceeds the budget,
// we add 2× the shortfall to the plate (split symmetrically) so the right
// edge widens far enough to keep the text inside the gray bar.
function calcPlayerStatsExtension(grayW){
  const BUDGET = 555;
  if (grayW <= BUDGET) return 0;
  return Math.min(2 * Math.ceil(grayW - BUDGET), PLATE_MAX_EXTENSION);
}

function drawPlayerStatsPlate(frame){
  const scale = state.scale;
  const { cx, cy } = plateTargetCenter(frame.align, scale);
  const tx = cx + (frame.xOff || 0);
  const ty = cy + (frame.yOff || 0);

  const ps = state.playerStats;
  const name    = String(frame.header || '').trim();
  const pos     = String(ps.position || '').trim().toUpperCase();
  const jerseyN = String(ps.jersey || '').replace(/^#/, '').trim();
  const jersey  = jerseyN ? '#' + jerseyN : '';

  const grayW = measureGrayBarPrefix(name, pos, jersey);
  const extraWidth = calcPlayerStatsExtension(grayW);
  const halfL = Math.floor(extraWidth / 2);

  const plateImg = (frame.bgImg && extraWidth > 0)
    ? buildExtendedPlate(frame.bgImg, extraWidth)
    : frame.bgImg;

  ctx.save();
  ctx.translate(tx, ty);
  ctx.scale(scale, scale);
  ctx.translate(-(SRC_CX + halfL), -SRC_CY);

  if (plateImg) ctx.drawImage(plateImg, 0, 0);

  ctx.fillStyle = TEXT_COLOR;
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';

  // ── Gray bar: [POS] [#JERSEY] [NAME], left-aligned past the logo ──────
  // Drawing at X = GB_LEFT_X + halfL keeps the layout pinned at the same
  // canvas position regardless of any plate extension (logo and text both
  // sit in the unchanged-on-extension portion of the transform).
  let curX = GB_LEFT_X + halfL;
  if (pos) {
    ctx.font = `800 ${GB_POS_FS}px 'Barlow Condensed','Barlow',${FONT_FAMILY}`;
    const w = ctx.measureText(pos).width;
    ctx.fillText(pos, curX, HEADER_CY);
    curX += w + GB_GAP_PJ;
  }
  if (jersey) {
    ctx.font = `900 ${GB_JERSEY_FS}px ${FONT_FAMILY}`;
    const w = ctx.measureText(jersey).width;
    ctx.fillText(jersey, curX, HEADER_CY);
    curX += w + GB_GAP_JN;
  }
  ctx.font = `700 ${HEADER_EM}px ${FONT_FAMILY}`;
  ctx.fillText(name, curX, HEADER_CY);

  // ── Color bar (school primary) ────────────────────────────────────────
  // Sits between the gray bar and the white-value strip. Left edge stays at
  // canvas x=720 (just past every school's logo) regardless of any plate
  // extension; right edge tracks the plate's right edge as it widens.
  const colors = SCHOOL_PRIMARY_COLORS[frame.school] || { bg: '#00263A', fg: '#FFFFFF' };
  const barLeftX  = COLOR_BAR_LEFT_BASE  + halfL;
  const barRightX = COLOR_BAR_RIGHT_BASE + halfL + (extraWidth - halfL);
  ctx.fillStyle = colors.bg;
  ctx.fillRect(barLeftX, COLOR_BAR_TOP, barRightX - barLeftX, COLOR_BAR_BOTTOM - COLOR_BAR_TOP);

  // ── Color-bar category labels (school FG) ─────────────────────────────
  ctx.textAlign = 'center';
  ctx.fillStyle = colors.fg;
  ctx.font = `800 ${CAT_LABEL_FS}px 'Barlow Condensed','Barlow',${FONT_FAMILY}`;
  ps.stats.forEach((s, i) => {
    const base = WB_BLOCK_BASES[i];
    if (base === undefined) return;
    const bx = base + halfL;
    const label = String(s.label || '').toUpperCase();
    ctx.fillText(label.split('').join(' '), bx, CAT_LABEL_CY);
  });

  // ── White value strip (navy values) ────────────────────────────────────
  ctx.fillStyle = TEXT_COLOR;
  ctx.font = `900 ${WB_VALUE_FS}px ${FONT_FAMILY}`;
  ps.stats.forEach((s, i) => {
    const base = WB_BLOCK_BASES[i];
    if (base === undefined) return;
    const bx = base + halfL;
    const value = String(s.value || '');
    ctx.fillText(value || '—', bx, WB_VALUE_CY);
  });

  ctx.restore();
}

// (Stats now render INSIDE the plate's white bar via drawPlayerStatsPlate;
// the legacy above-plate overlay was removed in favor of higher-contrast
// navy-on-white inside the plate art.)

function renderPlayerStatsControls(){
  const ps = state.playerStats;

  // Sport
  const sportSel = document.getElementById('psSport');
  sportSel.innerHTML = Object.keys(SPORT_STATS)
    .map(s => `<option value="${escapeAttr(s)}"${s === ps.sport ? ' selected' : ''}>${s}</option>`)
    .join('');

  // School (reuse the same SCHOOLS list as the rest of the page)
  const schoolSel = document.getElementById('psSchool');
  const f = state.frames[0];
  schoolSel.innerHTML = SCHOOLS
    .map(s => `<option value="${escapeAttr(s.id)}"${s.id === f?.school ? ' selected' : ''}>${s.name}</option>`)
    .join('');

  // Player name / position / jersey
  document.getElementById('psName').value     = f?.header || '';
  document.getElementById('psPosition').value = ps.position || '';
  document.getElementById('psJersey').value   = ps.jersey   || '';

  // Three stat blocks (label + value)
  const wrap = document.getElementById('psStats');
  wrap.innerHTML = ps.stats.map((s, i) => `
    <div class="frame-card">
      <div class="frame-card-title">Stat ${i+1}</div>
      <div class="row-2">
        <div class="field">
          <label class="field-label">Label</label>
          <input data-ps-i="${i}" data-ps-k="label" type="text" maxlength="6" value="${escapeAttr(s.label)}">
        </div>
        <div class="field">
          <label class="field-label">Value</label>
          <input data-ps-i="${i}" data-ps-k="value" type="text" maxlength="10" value="${escapeAttr(s.value)}">
        </div>
      </div>
    </div>
  `).join('');

  // Wire input listeners for the dynamic stat inputs.
  wrap.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = +e.target.dataset.psI;
      const k = e.target.dataset.psK;
      ps.stats[i][k] = e.target.value;
      draw();
    });
  });
}

// ─── Plate auto-extension ─────────────────────────────────────────────────
// When header or sub text is too long for the plate's default usable width,
// we 5-slice the nameplate PNG and stretch a 1px column on each side of the
// text area to widen the plate symmetrically. The stretch columns sit in the
// uniform mid-fill zone of every host-school nameplate (verified pixel-stable
// across all 10 plates: x=770 and x=1150 are inside the safe range).
const PLATE_SPLIT_L          = 770;   // source x — past every school's logo zone
const PLATE_SPLIT_R          = 1150;  // source x — before any right-edge decoration
const PLATE_USABLE_WIDTH     = 620;   // text width budget before extending kicks in
const PLATE_TEXT_PADDING     = 30;    // breathing room each side of the longest line
const PLATE_MAX_EXTENSION    = 600;   // hard cap — keeps plate within canvas bounds
const _extendedPlateCache    = new Map(); // bgImg+extra → offscreen canvas

function calcPlateExtensionFromWidth(longestWidth){
  const need = longestWidth + PLATE_TEXT_PADDING * 2;
  if (need <= PLATE_USABLE_WIDTH) return 0;
  return Math.min(Math.ceil(need - PLATE_USABLE_WIDTH), PLATE_MAX_EXTENSION);
}

function calcPlateExtension(header, sub){
  // Measure widest line at its actual font, in source coords.
  ctx.save();
  ctx.font = `700 ${HEADER_EM}px ${FONT_FAMILY}`;
  const hw = ctx.measureText(String(header || '')).width;
  ctx.font = `700 ${SUB_EM}px ${FONT_FAMILY}`;
  const sw = ctx.measureText(String(sub || '')).width;
  ctx.restore();
  return calcPlateExtensionFromWidth(Math.max(hw, sw));
}

function buildExtendedPlate(bgImg, extraWidth){
  const cacheKey = (bgImg.src || '') + '|' + extraWidth;
  if (_extendedPlateCache.has(cacheKey)) return _extendedPlateCache.get(cacheKey);
  const halfL = Math.floor(extraWidth / 2);
  const halfR = extraWidth - halfL;
  const W = bgImg.naturalWidth  || bgImg.width  || CANVAS_W;
  const H = bgImg.naturalHeight || bgImg.height || CANVAS_H;
  const out = document.createElement('canvas');
  out.width  = W + extraWidth;
  out.height = H;
  const o = out.getContext('2d');
  // Left cap (school logo + brand stripe)
  o.drawImage(bgImg, 0, 0, PLATE_SPLIT_L, H,  0, 0, PLATE_SPLIT_L, H);
  // Stretch L (1px column repeated)
  if (halfL > 0) {
    o.drawImage(bgImg, PLATE_SPLIT_L, 0, 1, H,  PLATE_SPLIT_L, 0, halfL, H);
  }
  // Middle uniform zone (drawn unchanged width)
  const midSrcW = PLATE_SPLIT_R - PLATE_SPLIT_L;
  o.drawImage(bgImg, PLATE_SPLIT_L, 0, midSrcW, H,  PLATE_SPLIT_L + halfL, 0, midSrcW, H);
  // Stretch R (1px column repeated, sampled just before the right cap)
  if (halfR > 0) {
    o.drawImage(bgImg, PLATE_SPLIT_R - 1, 0, 1, H,  PLATE_SPLIT_R + halfL, 0, halfR, H);
  }
  // Right cap (right edge + drop shadow)
  o.drawImage(bgImg, PLATE_SPLIT_R, 0, W - PLATE_SPLIT_R, H,  PLATE_SPLIT_R + halfL + halfR, 0, W - PLATE_SPLIT_R, H);
  // Cap the cache so we don't accumulate canvases forever.
  if (_extendedPlateCache.size > 16) _extendedPlateCache.clear();
  _extendedPlateCache.set(cacheKey, out);
  return out;
}

// ─── Render ───────────────────────────────────────────────────────────────
function drawPlate(frame){
  if (!frame) return;
  if (state.mode === 'player-stats') return drawPlayerStatsPlate(frame);
  const scale = state.scale;
  const { cx, cy } = plateTargetCenter(frame.align, scale);
  const tx = cx + (frame.xOff || 0);
  const ty = cy + (frame.yOff || 0);

  // If text overflows the plate's usable width, widen the plate art via 5-slice.
  const extraWidth = calcPlateExtension(frame.header, frame.sub);
  const halfL = Math.floor(extraWidth / 2);
  const plateImg = (frame.bgImg && extraWidth > 0)
    ? buildExtendedPlate(frame.bgImg, extraWidth)
    : frame.bgImg;

  ctx.save();
  ctx.translate(tx, ty);
  ctx.scale(scale, scale);
  // Shift origin so the plate's bbox center stays at (tx, ty) regardless of
  // any extension — text x is also shifted by halfL so it tracks the plate.
  ctx.translate(-(SRC_CX + halfL), -SRC_CY);

  if (plateImg) ctx.drawImage(plateImg, 0, 0);

  ctx.fillStyle = TEXT_COLOR;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = `700 ${HEADER_EM}px ${FONT_FAMILY}`;
  ctx.fillText(frame.header || '', TEXT_CX + halfL, HEADER_CY);
  ctx.font = `700 ${SUB_EM}px ${FONT_FAMILY}`;
  ctx.fillText(frame.sub || '', TEXT_CX + halfL, SUB_CY);

  ctx.restore();
}

function draw(opts){
  const includeBg = opts && opts.includeBg !== undefined ? opts.includeBg : true;
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  if (includeBg && state.bgRefImg) {
    ctx.drawImage(state.bgRefImg, 0, 0, CANVAS_W, CANVAS_H);
  }
  state.frames.forEach(drawPlate);
}

// ─── Player + Stats panel listeners ───────────────────────────────────────
document.getElementById('psSport').addEventListener('change', e => {
  // Update sport. Keep custom values if the user has typed any; only refresh
  // labels they haven't manually changed (heuristic: any label that still
  // matches a default for *any* sport gets remapped to the new sport's defaults).
  const ps = state.playerStats;
  const newSport = e.target.value;
  const def = SPORT_STATS[newSport];
  if (!def) return;
  ps.sport = newSport;
  if (!ps.position || isDefaultPositionFor(ps.position)) ps.position = def.defPos;
  // Remap labels: replace each slot's label with the new sport's default,
  // but preserve user-typed values.
  ps.stats = def.stats.map(([l, v], i) => ({
    label: l,
    value: ps.stats[i]?.value ?? v,
  }));
  syncFrameFromPlayerStats();
  renderPlayerStatsControls();
  draw();
});
function isDefaultPositionFor(pos){
  const p = String(pos || '').toUpperCase().trim();
  return Object.values(SPORT_STATS).some(s => s.defPos === p);
}

document.getElementById('psSchool').addEventListener('change', async e => {
  const f = state.frames[0];
  if (!f) return;
  f.school = e.target.value;
  await ensureBg(f);
  draw();
});

document.getElementById('psName').addEventListener('input', () => {
  syncFrameFromPlayerStats();
  draw();
});

  const ps = state.playerStats;

// ─── Master Roster fetch + player picker ──────────────────────────────────
async function fetchMasterRoster(){
  if (_masterRosterCache) return _masterRosterCache;
  const url = `https://docs.google.com/spreadsheets/d/${MASTER_ROSTER_SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(MASTER_ROSTER_TAB)}`;
  const res = await fetch(url, { cache: 'no-store' });
  if (!res.ok) throw new Error(`Sheet fetch failed (HTTP ${res.status}). The sheet must be "Anyone with the link → Viewer".`);
  const text = await res.text();
  // gviz wraps JSON in `google.visualization.Query.setResponse({...});`
  const m = text.match(/setResponse\(([\s\S]+)\);?\s*$/);
  if (!m) throw new Error('Unexpected gviz response shape');
  const data = JSON.parse(m[1]);
  const cols = (data.table?.cols || []).map(c => String(c.label || c.id || '').trim().toLowerCase());
  const rows = (data.table?.rows || []).map(r => {
    const obj = {};
    (r.c || []).forEach((cell, i) => {
      if (!cols[i]) return;
      obj[cols[i]] = cell == null ? '' : (cell.f != null ? cell.f : cell.v);
    });
    return obj;
  });
  _masterRosterCache = { rows };
  return _masterRosterCache;
}

function cleanJersey(v){
  if (v == null || v === '') return '';
  const s = String(v).trim();
  if (/^-?\d+\.0+$/.test(s)) return s.replace(/\.0+$/, '');
  return s;
}
function jerseyNumeric(v){
  const m = String(v ?? '').match(/-?\d+/);
  return m ? parseInt(m[0], 10) : Number.POSITIVE_INFINITY;
}

async function loadPlayersForCurrentSchoolSport(){
  const ps = state.playerStats;
  const sportKey = ps.sport;
  const schoolKey = state.frames[0]?.school;
  const masterSchool = MASTER_ROSTER_SCHOOL_MAP[schoolKey];
  const masterSport  = MASTER_ROSTER_SPORT_MAP[sportKey];
  if (!masterSchool) throw new Error(`No Master Roster mapping for school "${schoolKey}".`);
  if (!masterSport)  throw new Error(`No Master Roster mapping for sport "${sportKey}".`);
  const { rows } = await fetchMasterRoster();
  const filtered = rows.filter(r =>
    String(r['school'] || '').trim() === masterSchool &&
    String(r['sport']  || '').trim() === masterSport
  );
  const players = filtered.map(r => ({
    name:     String(r['name'] || r['full name'] || r['player'] || r['player name'] || '').trim(),
    jersey:   cleanJersey(r['#'] || r['number'] || r['jersey'] || r['no.'] || r['no'] || ''),
    position: String(r['position'] || r['pos'] || '').trim(),
  })).filter(p => p.name);
  players.sort((a, b) => jerseyNumeric(a.jersey) - jerseyNumeric(b.jersey));
  return players;
}

document.getElementById('psLoadRoster').addEventListener('click', async () => {
  const btn = document.getElementById('psLoadRoster');
  const sel = document.getElementById('psPlayerPick');
  const origLabel = '📥 Load Roster for School + Sport';
  btn.disabled = true;
  btn.textContent = '⏳ Loading…';
  sel.innerHTML = '<option value="">Loading…</option>';
  try {
    const players = await loadPlayersForCurrentSchoolSport();
    if (!players.length) {
      sel.innerHTML = `<option value="">— No players found —</option>`;
      btn.textContent = '⚠ No players found';
    } else {
      sel.innerHTML = '<option value="">— Pick a player —</option>' +
        players.map((p, i) => {
          const prefix = p.jersey ? '#' + p.jersey + '  ' : '';
          return `<option value="${i}">${escapeAttr(prefix + p.name)}</option>`;
        }).join('');
      btn.textContent = `✓ Loaded ${players.length} — Refresh`;
      sel._players = players;
    }
  } catch (err) {
    console.error(err);
    sel.innerHTML = `<option value="">— Load failed —</option>`;
    btn.textContent = '✗ ' + (err.message || 'Failed').slice(0, 40);
    setStatus(err.message || 'Master Roster fetch failed', true);
  } finally {
    setTimeout(() => { btn.disabled = false; if (btn.textContent.startsWith('✗')) btn.textContent = origLabel; }, 100);
  }
});

document.getElementById('psPlayerPick').addEventListener('change', e => {
  const sel = e.target;
  const idx = parseInt(sel.value, 10);
  if (isNaN(idx)) return;
  const p = sel._players?.[idx];
  if (!p) return;
  // Pre-fill name, jersey, and a normalized position abbreviation. Operator
  // can still edit any field afterward.
  const masterSport = MASTER_ROSTER_SPORT_MAP[state.playerStats.sport];
  const normalized  = normalizeMasterPosition(p.position, masterSport);
  state.playerStats.position = normalized || state.playerStats.position;
  state.playerStats.jersey   = p.jersey   || '';
  document.getElementById('psName').value     = p.name.toUpperCase();
  document.getElementById('psPosition').value = state.playerStats.position;
  document.getElementById('psJersey').value   = state.playerStats.jersey;
  syncFrameFromPlayerStats();
  draw();
});

// Reset the picker when school or sport changes (the loaded roster no longer
// matches the new selection).
function resetPlayerPicker(){
  const sel = document.getElementById('psPlayerPick');
  if (!sel) return;
  sel.innerHTML = '<option value="">— Click Load below —</option>';
  sel._players = null;
  const btn = document.getElementById('psLoadRoster');
  if (btn) btn.textContent = '📥 Load Roster for School + Sport';
}
document.getElementById('psSport').addEventListener('change', resetPlayerPicker);
document.getElementById('psSchool').addEventListener('change', resetPlayerPicker);

// ─── Download ─────────────────────────────────────────────────────────────
document.getElementById('download').addEventListener('click', () => {
  const safe = (s) => (s||'').replace(/[^a-z0-9]+/gi,'_').replace(/^_|_$/g,'') || 'untitled';
  let filename;
  if (state.mode === 'player-stats') {
    const f = state.frames[0] || {};
    const ps = state.playerStats;
    filename = `Player_Stats_${safe(ps.sport)}_${safe(f.school)}_${safe(f.header)}.png`;
  } else {
    const desc = state.frames.map(f => `${safe(f.school)}-${safe(f.header)}`).join('__');
    filename = `Campus_Insider_${state.frameCount}plate_${desc}.png`;
  }
  // Re-render without the reference image unless the user opted in
  draw({ includeBg: state.bgInExport });
  const dataUrl = cvs.toDataURL('image/png');
  // Restore the on-screen preview (with reference if it was on)
  draw();
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename;
  a.click();
});

  state.frameCount = +fcSel.value;

    try { await document.fonts.load(`700 ${SUB_EM}px "Proxima Nova"`); } catch(_){}
    await document.fonts.ready;
  }

  await Promise.all([...state.frames.map(ensureBg), ensureBgRef()]);
  draw();
})();
if (document.fonts && document.fonts.ready) document.fonts.ready.then(draw);
